name: optic_tv
description: A premium, professional IPTV application built from scratch.
version: 1.5.0+223

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # High-Performance Media Playback (ExoPlayer via video_player)
  url_launcher: ^6.3.0
  animations: ^2.0.11
  rxdart: ^0.28.0
  collection: ^1.18.0

  # State Management & DI
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # PocketBase & Backend
  pocketbase: ^0.24.0+1
  flutter_local_notifications: ^22.0.1

  # Localization & RTL
  flutter_localizations:
    sdk: flutter
  intl: any

  # Networking & Parsing
  dio: ^5.10.0
  m3u_nullsafe: ^1.0.4
  socket_io_client: ^3.0.0

  # Settings & persistence
  shared_preferences: ^2.2.3
  path_provider: ^2.1.6
  file_picker: ^12.0.0-beta.7

  # UI & UX
  share_plus: ^13.2.1
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  palette_generator: ^0.3.3+3
  lottie: ^3.2.0
  simple_pip_mode: ^1.1.0
  dio_cache_interceptor: ^4.0.7
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^1.2.0
  wakelock_plus: ^1.2.8
  dpad: ^3.0.0
  flutter_jailbreak_detection: ^1.10.0
  google_nav_bar: any
  translator: any
  custom_tv_text_field: ^1.0.0

  # Media Engine — ExoPlayer (Android native, zero overhead)
  video_player: ^2.9.1
  device_info_plus: ^13.2.0
  package_info_plus: any
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  googleapis_auth: ^2.3.3
  open_filex: ^4.7.0
  firebase_database: ^12.4.6
  cast: ^2.1.0
  dlna_dart: ^0.1.1
  babstrap_settings_screen: ^0.1.7
  freerasp: ^8.0.0
  http_certificate_pinning: ^3.0.1
  mqtt_client: ^10.11.11
  aptabase_flutter: ^0.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/flut.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/flut.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/json/
    - assets/images/flut.png
    - assets/images/logo.png
    - assets/images/flixy/
  fonts:
    - family: Rabar
      fonts:
        - asset: assets/fonts/Rabar_021.ttf
          weight: 400
    - family: RobotoCondensed
      fonts:
        - asset: assets/fonts/RobotoCondensed-Regular.ttf
          weight: 400

dependency_overrides:
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.1
