name: optic_tv
description: A premium, professional IPTV application built from scratch.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Premium Media Playback
  media_kit: ^1.1.0
  media_kit_video: ^1.1.0
  media_kit_libs_video: ^1.0.7

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase & Backend
  firebase_core: ^3.1.0
  firebase_database: ^11.0.1

  # Localization & RTL
  flutter_localizations:
    sdk: flutter
  intl: any

  # Networking & Parsing
  dio: ^5.4.3+1
  m3u_nullsafe: ^1.0.4

  # UI & UX
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Rabar
      fonts:
        - asset: assets/fonts/Rabar_044.ttf
