                  </div>
                  <div class="list-item-right">
                    <button class="btn btn-outline btn-xs" onclick="resendBroadcast('${b.id}')"><i data-lucide="rotate-cw" style="width:11px;height:11px;"></i> Resend</button>
                    <button class="btn btn-danger icon-btn" onclick="deleteBroadcast('${b.id}')"><i data-lucide="trash-2"></i></button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // Rendering — Update Manager Tab
    // ════════════════════════════════════════════════════════════
    function renderUpdatesTab() {
      const history = [...updateRecords].sort((a, b) => (b.versionCode || 0) - (a.versionCode || 0));
      return `
        <div class="two-col">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i data-lucide="cloud-upload"></i> Push New Update</div>
              ${updateConfig ? `<span class="badge badge-success">Active v${esc(updateConfig.versionName)}</span>` : '<span class="badge">No update</span>'}
            </div>
            <div class="card-body">
              <label class="text-muted mb-2" style="display:block;">Push a new APK update to all users</label>
              ${field('APK URL', 'apkUrl', '', { type: 'url', placeholder: 'https://…/app-release.apk' })}
              <div class="field-row">
                ${field('Version name', 'versionName', '', { placeholder: 'e.g. 2.4.0' })}
                ${field('Version code', 'versionCode', '', { type: 'number' })}
              </div>
              ${field('Release notes', 'releaseNotes', '', { type: 'textarea', rows: 3 })}
              <button class="btn btn-primary btn-block" id="pushUpdateBtn"><i data-lucide="send"></i> Push Update</button>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title"><i data-lucide="info"></i> Current Version Detail</div></div>
            <div class="card-body">
              ${updateConfig ? `
                <div class="field-group"><span class="field-label">Version</span><div class="fw-600">v${esc(updateConfig.versionName)} (code ${updateConfig.versionCode})</div></div>
                <div class="field-group"><span class="field-label">APK URL</span><div class="text-sm" style="word-break:break-all;">${esc(updateConfig.url || updateConfig.apkUrl || '—')}</div></div>
                <div class="field-group"><span class="field-label">Release Notes</span><div class="text-sm text-muted">${esc(updateConfig.releaseNotes || 'None')}</div></div>
              ` : emptyState('cloud-upload', 'No active update configured')}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i data-lucide="history"></i> Version History</div>
            <span class="badge">${history.length} version(s)</span>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table class="data-table">
                <thead><tr><th>Status</th><th>Version</th><th>Code</th><th>Notes</th><th style="width:140px;">Actions</th></tr></thead>
                <tbody>
                  ${history.length === 0 ? `<tr><td colspan="5">${emptyState('cloud-upload', 'No update history yet')}</td></tr>` : ''}
                  ${history.map(u => `
                    <tr>
                      <td>${(u.active || u.isActive) ? '<span class="badge badge-success">Active</span>' : '<span class="badge">Inactive</span>'}</td>
                      <td class="fw-600">v${esc(u.versionName)}</td>
                      <td>${u.versionCode}</td>
                      <td class="text-xs text-muted" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(u.releaseNotes || '—')}</td>
                      <td>
                        <div class="flex-row" style="gap:4px;">
                          ${!(u.active || u.isActive) ? `<button class="btn btn-outline btn-xs" onclick="setActiveUpdate('${u.id}')">Activate</button>` : ''}
                          <button class="btn btn-danger icon-btn" onclick="deleteUpdateRecord('${u.id}')"><i data-lucide="trash-2"></i></button>
                        </div>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // Rendering — Analytics Tab
    // ════════════════════════════════════════════════════════════
    function renderAnalyticsTab() {
      const maxDaily = Math.max(1, ...analyticsViewsDaily.map(d => d.views || 0));
      const topChannels = [...analyticsChannelViews].sort((a, b) => (b.total || 0) - (a.total || 0));
      return `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-content"><div class="stat-info"><h3>Total Views (All Time)</h3><div class="stat-value">${(analyticsViewsTotal || 0).toLocaleString()}</div></div><div class="stat-icon"><i data-lucide="eye" style="color:#22c55e;"></i></div></div></div>
          <div class="stat-card"><div class="stat-content"><div class="stat-info"><h3>Tracked Channels</h3><div class="stat-value">${analyticsChannelViews.length}</div></div><div class="stat-icon"><i data-lucide="tv" style="color:#8b5cf6;"></i></div></div></div>
          <div class="stat-card"><div class="stat-content"><div class="stat-info"><h3>Days Tracked</h3><div class="stat-value">${analyticsViewsDaily.length}</div></div><div class="stat-icon"><i data-lucide="calendar" style="color:#3b82f6;"></i></div></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="bar-chart-3"></i> Daily Views</div></div>
          <div class="card-body">
            ${analyticsViewsDaily.length === 0 ? emptyState('bar-chart-3', 'No daily analytics recorded yet') : `
              <div class="bar-chart" style="height:200px;">
                ${analyticsViewsDaily.slice(-30).map(d => `
                  <div class="bar-chart-col" title="${esc(d.date)}: ${d.views} views">
                    <div class="bar-chart-bar" style="height:${Math.max(4, ((d.views || 0) / maxDaily) * 100)}%;"></div>
                    <div class="bar-chart-label">${(d.date || '').slice(5)}</div>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="trophy"></i> Channel Views Ranking</div></div>
          <div class="card-body">
            <div class="table-wrap">
              <table class="data-table">
                <thead><tr><th>#</th><th>Channel</th><th class="text-right">Views</th></tr></thead>
                <tbody>
                  ${topChannels.length === 0 ? `<tr><td colspan="3">${emptyState('bar-chart-3', 'No view data recorded yet')}</td></tr>` : ''}
                  ${topChannels.map((c, i) => `
                    <tr><td>${i + 1}</td><td>${esc(c.name || 'Unknown')}</td><td class="text-right fw-600">${(c.total || 0).toLocaleString()}</td></tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // Rendering — Admin Logs Tab
    // ════════════════════════════════════════════════════════════
    function renderLogsTab() {
      const totalPages = Math.max(1, Math.ceil(adminLogs.length / LOGS_PER_PAGE));
      logsPage = Math.min(logsPage, totalPages);
      const pageItems = adminLogs.slice((logsPage - 1) * LOGS_PER_PAGE, logsPage * LOGS_PER_PAGE);
      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i data-lucide="scroll-text"></i> Admin Activity Log</div>
            <span class="badge">${adminLogs.length} entries</span>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table class="data-table">
                <thead><tr><th>When</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
                <tbody>
                  ${pageItems.length === 0 ? `<tr><td colspan="4">${emptyState('scroll-text', 'No admin activity recorded yet')}</td></tr>` : ''}
                  ${pageItems.map(l => `
                    <tr>
                      <td class="text-xs text-muted" style="white-space:nowrap;">${formatFullDate(l.created)}</td>
                      <td class="text-sm">${esc(l.user || '—')}</td>
                      <td><span class="tag">${esc(l.action || '—')}</span></td>
                      <td class="text-xs text-muted" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(l.details || '')}">${esc(l.details || '')}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
            ${renderPagination(logsPage, totalPages, 'setLogsPage')}
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // Rendering — Settings Tab
    // ════════════════════════════════════════════════════════════
    function renderSettingsTab() {
      return `
        <div class="two-col">
          <div class="card">
            <div class="card-header"><div class="card-title"><i data-lucide="server"></i> Connection</div></div>
            <div class="card-body">
              <div class="field-group"><span class="field-label">PocketBase URL</span><div class="text-sm" style="word-break:break-all;">${PB_URL}</div></div>
              <div class="field-group"><span class="field-label">Status</span>${renderConnIndicator()}</div>
              <button class="btn btn-outline btn-sm" onclick="checkConnection()"><i data-lucide="refresh-cw"></i> Test connection</button>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title"><i data-lucide="user"></i> Session</div></div>
            <div class="card-body">
              <div class="field-group"><span class="field-label">Signed in as</span><div class="text-sm">${esc(currentUser?.email || '—')}</div></div>
              <div class="field-group"><span class="field-label">Account type</span><div class="text-sm">${authCollection === '_superusers' ? 'Superuser (full access)' : 'App user (limited by collection rules)'}</div></div>
              <button class="btn btn-danger btn-sm" onclick="logout()"><i data-lucide="log-out"></i> Sign out</button>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="palette"></i> Appearance</div></div>
          <div class="card-body">
            <div class="flex-between">
              <span class="text-sm">Theme</span>
              <button class="btn btn-outline btn-sm" onclick="toggleTheme()"><i data-lucide="${theme === 'dark' ? 'sun' : 'moon'}"></i> ${theme === 'dark' ? 'Switch to Light' : 'Switch to Dark'}</button>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="keyboard"></i> Shortcuts &amp; Tips</div></div>
          <div class="card-body">
            <p class="text-sm text-muted mb-2">Use the sidebar to jump between Channels, Groups, Login Codes, Broadcasts, Update Manager, Analytics and Logs.</p>
            <p class="text-sm text-muted">Every field on a channel — including <span class="kbd">name</span>, <span class="kbd">url</span>, DRM settings, and alternate sources — is editable from the pencil icon in the Channels tab.</p>
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // Confirm Modal
    // ════════════════════════════════════════════════════════════
    function renderConfirmModal() {
      if (!confirmState) return '';
      return `
        <div class="modal-backdrop confirm-modal" onclick="if(event.target===this) closeConfirm()">
          <div class="modal">
            <div class="modal-body" style="text-align:center;padding-top:28px;">
              ${confirmState.danger ? `
                <div class="confirm-icon"><i data-lucide="alert-triangle"></i></div>
              ` : `
                <div class="confirm-icon" style="background:rgba(139,92,246,0.15);"><i data-lucide="help-circle" style="color:#8b5cf6;"></i></div>
              `}
              <h3 style="margin-bottom:8px;">${esc(confirmState.title)}</h3>
              <p class="text-muted text-sm">${esc(confirmState.message)}</p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
              <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
              <button class="btn ${confirmState.danger ? 'btn-danger' : 'btn-primary'}" onclick="runConfirm()">
                <i data-lucide="${confirmState.danger ? 'trash-2' : 'check'}"></i> Confirm
              </button>
            </div>
          </div>
        </div>
      `;
    }
    window.closeConfirm = closeConfirm;
    window.runConfirm = runConfirm;

    // Renders just the modal layer without re-rendering the whole app
    // (keeps input focus / typed text intact while a modal is open).
    function renderModals() {
      let layer = document.getElementById('modalLayer');
      if (!layer) {
        layer = document.createElement('div');
        layer.id = 'modalLayer';
        document.body.appendChild(layer);
      }
      layer.innerHTML = renderChannelModal() + renderGroupModal() + renderConfirmModal();
      lucide.createIcons();
      attachModalEventListeners();
    }

    // ════════════════════════════════════════════════════════════
    // Master render
    // ════════════════════════════════════════════════════════════
    function renderTabContent() {
      switch (currentTab) {
        case 'channels': return renderChannelsTab();
        case 'groups': return renderGroupsTab();
        case 'codes': return renderCodesTab();
        case 'broadcasts': return renderBroadcastsTab();
        case 'updates': return renderUpdatesTab();
        case 'analytics': return renderAnalyticsTab();
        case 'logs': return renderLogsTab();
        case 'settings': return renderSettingsTab();
        default: return renderDashboardTab();
      }
    }

    function renderDashboard() {
      return `
        <div class="shell">
          ${renderSidebar()}
          <div class="main-area">
            ${renderTopbar()}
            <div class="content-area">
              ${renderTabContent()}
            </div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      const app = document.getElementById('app');
      if (!pb.authStore.isValid || !currentUser) {
        app.innerHTML = renderLogin();
      } else {
        app.innerHTML = renderDashboard();
      }
      lucide.createIcons();
      attachEventListeners();
      renderModals();
    }

    // ════════════════════════════════════════════════════════════
    // Event Listeners — main app
    // ════════════════════════════════════════════════════════════
    const debouncedChannelSearch = debounce((val) => {
      channelSearch = val; channelPage = 1; renderApp();
      setTimeout(() => document.getElementById('channelSearchInput')?.focus(), 0);
    }, 250);
    const debouncedCodeSearch = debounce((val) => {
      codeSearch = val; codesPage = 1; renderApp();
      setTimeout(() => document.getElementById('codeSearchInput')?.focus(), 0);
    }, 250);

    function attachEventListeners() {
      // Login — use both submit event and button click for max compatibility
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmail')?.value || '';
          const password = document.getElementById('loginPassword')?.value || '';
          const btn = document.getElementById('loginBtn');
          if (btn) { btn.innerHTML = '<span class="loading-spinner"></span> Signing in...'; btn.disabled = true; }
          await login(email, password);
          // If login failed (loginBtn still in DOM), restore the button
          const stillBtn = document.getElementById('loginBtn');
          if (stillBtn) { stillBtn.innerHTML = '<i data-lucide="log-in"></i> Sign In'; stillBtn.disabled = false; lucide.createIcons(); }
        });
      }

      if (!currentUser) return;

      // Channels tab
      document.getElementById('channelSearchInput')?.addEventListener('input', (e) => debouncedChannelSearch(e.target.value));
      document.getElementById('channelGroupFilter')?.addEventListener('change', (e) => { channelFilterGroup = e.target.value; channelPage = 1; renderApp(); });
      document.getElementById('channelTypeFilter')?.addEventListener('change', (e) => { channelFilterType = e.target.value; channelPage = 1; renderApp(); });

      // Groups tab
      document.getElementById('addGroupBtn')?.addEventListener('click', () => {
        const name = document.getElementById('newGroupName').value.trim();
        if (!name) { showToast('Enter a group name', 'error'); return; }
        createGroup(name);
      });
      document.getElementById('newGroupName')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('addGroupBtn').click(); });

      // Codes tab
      document.getElementById('codeSearchInput')?.addEventListener('input', (e) => debouncedCodeSearch(e.target.value));
      document.getElementById('generateCodeBtn')?.addEventListener('click', () => {
        const input = document.getElementById('newCodeInput');
        const code = input.value.trim() || generateRandomCode();
        generateCode(code);
      });
      document.getElementById('bulkGenerateBtn')?.addEventListener('click', () => bulkGenerateCodes(10));
      document.getElementById('newCodeInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('generateCodeBtn').click(); });

      // Broadcasts tab
      document.getElementById('sendBroadcastBtn')?.addEventListener('click', () => {
        const title = document.getElementById('broadcastTitle').value.trim();
        const body = document.getElementById('broadcastBody').value.trim();
        const image = document.getElementById('broadcastImage')?.value.trim() || '';
        if (!title || !body) { showToast('Fill title and body', 'error'); return; }
        sendBroadcast(title, body, image);
      });
      document.getElementById('addAnnouncementBtn')?.addEventListener('click', () => {
        const text = document.getElementById('newAnnouncementInput').value.trim();
        if (!text) { showToast('Enter announcement text', 'error'); return; }
        createAnnouncement(text);
      });
      document.getElementById('newAnnouncementInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('addAnnouncementBtn').click(); });

      // Updates tab
      document.getElementById('pushUpdateBtn')?.addEventListener('click', () => {
        const apkUrl = document.getElementById('apkUrl').value.trim();
        const versionName = document.getElementById('versionName').value.trim();
        const versionCode = document.getElementById('versionCode').value.trim();
        const releaseNotes = document.getElementById('releaseNotes').value.trim();
        if (!apkUrl || !versionName || !versionCode) { showToast('Fill all update fields', 'error'); return; }
        pushUpdate(apkUrl, versionCode, versionName, releaseNotes);
      });
    }

    function attachModalEventListeners() {
      // Escape key closes whatever modal is open
      // (bound once via document listener below, not here)
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (confirmState) closeConfirm();
        else if (activeModal === 'channel') closeChannelModal();
        else if (activeModal === 'group') closeGroupModal();
      }
    });

    // ════════════════════════════════════════════════════════════
    // Global exposure for inline onclick handlers
    // ════════════════════════════════════════════════════════════
    window.deleteChannel = deleteChannel;
    window.reorderChannel = reorderChannel;
    window.bulkDeleteChannels = bulkDeleteChannels;
    window.exportChannelsJSON = exportChannelsJSON;
    window.exportChannelsM3U = exportChannelsM3U;
    window.createGroup = createGroup;
    window.deleteGroup = deleteGroup;
    window.reorderGroup = reorderGroup;
    window.toggleCodeActive = toggleCodeActive;
    window.unlockCodeDevice = unlockCodeDevice;
    window.deleteCode = deleteCode;
    window.bulkGenerateCodes = bulkGenerateCodes;
    window.toggleAnnouncement = toggleAnnouncement;
    window.deleteAnnouncement = deleteAnnouncement;
    window.resendBroadcast = resendBroadcast;
    window.deleteBroadcast = deleteBroadcast;
    window.setActiveUpdate = setActiveUpdate;
    window.deleteUpdateRecord = deleteUpdateRecord;
    window.logout = logout;
    window.toggleTheme = toggleTheme;
    window.refreshAndRender = refreshAndRender;
    window.checkConnection = checkConnection;
    window.setTab = setTab;

    // ════════════════════════════════════════════════════════════
    // Initialize
    // ════════════════════════════════════════════════════════════
    async function init() {
      document.body.setAttribute('data-theme', theme);
      if (pb.authStore.isValid) {
        currentUser = pb.authStore.model;
        authCollection = pb.authStore.model?.collectionName === '_superusers' ? '_superusers' : 'users';
        try {
          // Attempt to refresh the stored token so session survives page reloads.
          // If refresh fails (token expired / server restarted), clear auth and show login.
          if (authCollection === '_superusers') {
            await pb.collection('_superusers').authRefresh().catch(() => pb.authStore.clear());
          } else {
            await pb.collection('users').authRefresh().catch(() => pb.authStore.clear());
          }
        } catch (e) { pb.authStore.clear(); }

        if (pb.authStore.isValid) {
          currentUser = pb.authStore.model;
          await fetchAllData();
          checkConnection();
        } else {
          currentUser = null; // Token expired — will show login screen
        }
      }
      renderApp();
    }

    init();
  </script>
</body>
</html>
