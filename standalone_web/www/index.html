<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags for PWA and Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Kobani 4K - Premium Ultimate Streaming Platform">
    <meta name="theme-color" content="#06060a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kobani 4K">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2306060a'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='%233b82f6'>📺</text></svg">
    <title>Kobani 4K - Ultimate Stream Experience</title>
    
    <!-- Fonts: Google Fonts with fallbacks -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap');
    </style>

    <!-- CORE LIBRARIES -->
    <!-- Decryption & Utils -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- PLYR (Single Universal Engine) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <!-- ENTERPRISE STYLESHEET -->
    <style>
        :root {
            --primary: #3b82f6; --primary-hover: #2563eb;
            --secondary: #8b5cf6; --accent: #ec4899;
            --bg-base: #06060a; --bg-surface: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff; --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-brand: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px;
            --font-primary: 'Rabar', 'Outfit', system-ui, sans-serif;
            --font-english: 'Outfit', 'Rabar', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base); color: var(--text-main);
            font-family: var(--font-primary);
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* Anti-select to prevent text/URL scraping */
            user-select: none; -webkit-user-select: none;
        }

        /* Ambient Background */
        .ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: #020205; pointer-events: none; }
        .ambient-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 25s infinite ease-in-out alternate; }
        .orb-1 { width: 500px; height: 500px; background: rgba(59, 130, 246, 0.4); top: -150px; left: -150px; }
        .orb-2 { width: 600px; height: 600px; background: rgba(139, 92, 246, 0.3); bottom: -250px; right: -150px; animation-delay: -7s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(236, 72, 153, 0.2); top: 30%; left: 50%; animation-delay: -14s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(60px, 60px) scale(1.1); } 100% { transform: translate(-60px, 30px) scale(0.9); } }

        /* HEADER */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: rgba(6, 6, 10, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 100; transition: transform 0.3s ease;
        }

        .brand-container { display: flex; align-items: center; gap: 16px; }
        .brand-logo-img { height: 45px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.4)); }
        
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .header-select {
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border);
            padding: 10px 16px; border-radius: var(--radius-sm); color: #fff;
            outline: none; backdrop-filter: blur(10px); cursor: pointer;
            font-family: var(--font-primary); font-weight: 500; font-size: 0.95rem;
            transition: all 0.2s ease; appearance: none;
        }
        .header-select:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.2); }
        .header-select option { background: var(--bg-surface); color: #fff; padding: 12px; }

        /* MAIN LAYOUT */
        .main-layout { padding: 110px 5% 100px; max-width: 1800px; margin: 0 auto; }

        /* SEARCH & FILTER BAR */
        .controls-bar { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        @media(min-width: 768px) { .controls-bar { flex-direction: row; align-items: center; justify-content: space-between; } }
        
        .search-box { position: relative; flex: 1; max-width: 450px; }
        .search-box input {
            width: 100%; background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: var(--radius-md); padding: 16px 20px 16px 52px;
            color: #fff; font-size: 1rem; outline: none; transition: all 0.3s ease;
            backdrop-filter: blur(10px); font-family: var(--font-primary);
        }
        .search-box input:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        .search-box svg { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 22px; height: 22px; }

        .filters { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            background: var(--bg-card); border: 1px solid var(--glass-border); color: var(--text-muted);
            padding: 10px 24px; border-radius: 30px; font-weight: 500; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; white-space: nowrap; font-family: var(--font-primary);
        }
        .filter-btn:hover { background: var(--bg-card-hover); color: #fff; transform: translateY(-2px); }
        .filter-btn.active { background: var(--text-main); color: var(--bg-base); border-color: var(--text-main); box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        /* GRID SYSTEM */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px;
            min-height: 50vh;
        }

        /* CARDS */
        .channel-card {
            background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; display: flex; flex-direction: column;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            will-change: transform;
        }
        .channel-card:hover {
            transform: translateY(-10px) scale(1.02); background: var(--bg-card-hover);
            border-color: rgba(255,255,255,0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(59, 130, 246, 0.15);
        }

        .card-thumb {
            position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .card-bg-blur {
            position: absolute; inset: -30px; background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.4); z-index: 0; transition: transform 0.8s ease;
        }
        .channel-card:hover .card-bg-blur { transform: scale(1.1); filter: blur(15px) brightness(0.5); }
        
        .logo-img { position: relative; z-index: 1; width: 65%; height: 65%; object-fit: contain; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); }
        .channel-card:hover .logo-img { transform: scale(1.15) translateY(-5px); }

        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.3s ease; z-index: 2; }
        .channel-card:hover .play-overlay { opacity: 1; }
        .play-button { width: 64px; height: 64px; background: rgba(255,255,255,0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: scale(0.5); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .play-button svg { width: 28px; height: 28px; fill: #000; margin-left: 4px; }
        .channel-card:hover .play-button { transform: scale(1); }

        /* Badges & Actions */
        .fav-btn {
            position: absolute; top: 12px; right: 12px; z-index: 4; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            backdrop-filter: blur(8px); color: #fff; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fav-btn:hover { background: rgba(0,0,0,0.9); transform: scale(1.15); border-color: rgba(255,255,255,0.3); }
        .fav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(236, 72, 153, 0.1); }
        .fav-btn svg { width: 20px; height: 20px; fill: currentColor; transition: transform 0.3s ease; }
        .fav-btn.active svg { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.6)); }

        .live-tag {
            position: absolute; top: 12px; left: 12px; background: rgba(239, 68, 68, 0.95);
            color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            display: flex; align-items: center; gap: 6px; z-index: 3; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            backdrop-filter: blur(4px); letter-spacing: 0.5px;
        }
        .live-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 2s infinite; }

        .card-info { padding: 20px; }
        .card-title { font-size: 1.25rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 6px; }
        .card-group { font-size: 0.9rem; color: var(--primary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* SKELETON LOADER */
        .skeleton-card { background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; position: relative; border: 1px solid var(--glass-border); }
        .skeleton-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%); animation: shimmer 2s infinite;
        }
        .skel-thumb { width: 100%; aspect-ratio: 16/9; background: rgba(0,0,0,0.4); }
        .skel-info { padding: 20px; }
        .skel-line1 { width: 70%; height: 20px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 12px; }
        .skel-line2 { width: 40%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* ULTIMATE PLAYER MODAL */
        .player-modal {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .player-modal.active { opacity: 1; pointer-events: all; }

        .player-container {
            width: 100%; max-width: 1600px; background: #000; border-radius: var(--radius-md);
            overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); display: flex; flex-direction: column;
            transform: scale(0.9) translateY(40px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @media(min-width: 1024px) { .player-container { flex-direction: row; height: 85vh; } }
        .player-modal.active .player-container { transform: scale(1) translateY(0); }

        .video-wrapper { flex: 1; width: 100%; position: relative; background: #000; display: flex; flex-direction: column; justify-content: center; }
        @media(max-width: 1023px) { .video-wrapper { aspect-ratio: 16/9; } }
        
        .video-wrapper .plyr, .video-wrapper .video-js, .video-wrapper .shaka-video-container, .video-wrapper .artplayer-app, .video-wrapper [data-player] {
            position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important;
        }

        /* Widgets Layer */
        .player-widgets {
            position: absolute; top: 0; left: 0; right: 0; pointer-events: none; z-index: 50;
            padding: 24px; display: flex; justify-content: space-between; align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); transition: opacity 0.3s;
        }
        .player-widgets-content { pointer-events: all; display: flex; align-items: center; gap: 16px; }
        .player-title-display { font-size: 1.4rem; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.8); color: #fff; }
        
        .stats-widget {
            background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); padding: 12px 16px;
            border-radius: var(--radius-sm); backdrop-filter: blur(8px); font-size: 0.85rem; color: #cbd5e1;
            display: flex; flex-direction: column; gap: 4px; display: none; /* hidden by default */
        }
        .stats-widget.active { display: flex; }
        .stat-row { display: flex; justify-content: space-between; gap: 16px; }
        .stat-val { color: #fff; font-weight: 600; font-family: monospace; }

        .action-btns { display: flex; gap: 12px; pointer-events: all; }
        .icon-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); width: 44px; height: 44px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .icon-btn.danger:hover { background: rgba(239, 68, 68, 0.9); }
        .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* Related Panel */
        .related-panel { width: 100%; height: 350px; background: var(--bg-surface); border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 10; }
        @media(min-width: 1024px) { .related-panel { width: 400px; height: 100%; border-top: none; border-left: 1px solid var(--glass-border); } }
        
        .related-header { padding: 24px; font-weight: 700; font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .related-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .related-list::-webkit-scrollbar { width: 8px; }
        .related-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .related-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .related-item { display: flex; gap: 16px; padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; align-items: center; border: 1px solid transparent; }
        .related-item:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); transform: translateX(5px); }
        
        .related-thumb { width: 100px; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .related-thumb img { width: 65%; height: 65%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); z-index: 1; }
        .related-blur { position: absolute; inset: -10px; background-size: cover; background-position: center; filter: blur(10px) brightness(0.4); z-index: 0; }
        
        .related-info { flex: 1; overflow: hidden; }
        .related-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 4px; }
        .related-group { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: 600; }

        /* MOBILE BOTTOM NAVIGATION */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(6, 6, 10, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        @media(max-width: 767px) { 
            .bottom-nav { display: flex; justify-content: space-around; align-items: center; } 
            .main-layout { padding-bottom: 120px; }
            .controls-bar { display: none; } /* Hide top filters on mobile in favor of bottom nav / modal (simplified) */
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: color 0.3s; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active svg { fill: rgba(59, 130, 246, 0.2); }

        /* Engine Overrides */
        .plyr { --plyr-color-main: var(--primary); --plyr-video-background: #000; --plyr-font-family: var(--font-primary); }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
      <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6" /><stop offset="50%" stop-color="#8b5cf6" /><stop offset="100%" stop-color="#ec4899" />
      </linearGradient>
    </svg>

    <!-- ANTI-THEFT: DEVTOOLS TRAP -->
    <script>
        // Enterprise Protection Logic
        (function() {
            // Block Right Click
            document.addEventListener('contextmenu', event => event.preventDefault());
            // Block Key Combos (F12, Ctrl+Shift+I, Ctrl+U)
            document.addEventListener('keydown', function(e) {
                if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
            });
            // The debugger trap has been disabled for faster performance and testing.
            // Uncomment the lines below for strict production anti-theft.
            /*
            const trap = () => {
                const start = performance.now();
                debugger; // Will pause execution if DevTools is open
                const end = performance.now();
                if (end - start > 100) {
                    document.body.innerHTML = '<div style="color:red; text-align:center; padding:50px; font-size:2rem; background:#000; height:100vh;">Security Violation Detected. DevTools is restricted.</div>';
                }
            };
            setInterval(trap, 2000);
            */
        })();
    </script>

    <div class="ambient-bg"><div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div><div class="ambient-orb orb-3"></div></div>

    <header class="app-header">
        <div class="brand-container">
            <div class="brand-logo-img" style="display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">📺 KOBANI 4K</div>
        </div>
        
        <div class="header-controls">
            <select id="langSelect" class="header-select">
                <option value="ku">کوردی (Sorani)</option>
                <option value="en">English</option>
            </select>
        </div>
    </header>

    <main class="main-layout">
        <div class="controls-bar" id="desktopControls">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" data-i18n="search" placeholder="...">
            </div>
            <div class="filters" id="categories">
                <!-- Injected via JS -->
            </div>
        </div>

        <div class="grid-container" id="channelGrid">
            <!-- Skeletons initially -->
            <div class="skeleton-card"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line1"></div><div class="skel-line2"></div></div></div>
            <div class="skeleton-card"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line1"></div><div class="skel-line2"></div></div></div>
            <div class="skeleton-card"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line1"></div><div class="skel-line2"></div></div></div>
            <div class="skeleton-card"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line1"></div><div class="skel-line2"></div></div></div>
        </div>
    </main>

    <!-- MOBILE NAV -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-nav="all">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span data-i18n="navHome">Home</span>
        </div>
        <div class="nav-item" data-nav="sports">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
            <span data-i18n="sports">Sports</span>

    <!-- ENTERPRISE LOGIC LAYER -->
    <script>
        /**
         * DICTIONARY: English & Kurdish Sorani (LTR forced layout, Arabic script)
         */
        const dictionary = {
            en: {
                all: "All Channels", sports: "Sports", news: "News", movies: "Movies",
                entertainment: "Entertainment", music: "Music", kids: "Kids",
                favorites: "Favorites", search: "Search channels, movies...",
                loading: "Loading premium channels...", noChannels: "No channels found matching criteria.",
                live: "LIVE", related: "Related Channels", navHome: "Home"
            },
            ku: {
                all: "هەموو کەناڵەکان", sports: "وەرزش", news: "هەواڵ", movies: "فیلم",
                entertainment: "کەیف", music: "موزیک", kids: "منداڵان",
                favorites: "دڵخوازەکان", search: "گەڕان بۆ کەناڵەکان...",
                loading: "بارکردنی کەناڵەکان...", noChannels: "هیچ کەناڵێک نەدۆزرایەوە.",
                live: "ڕاستەوخۆ", related: "کەناڵە پەیوەندیدارەکان", navHome: "سەرەکی"
            }
        };

        /**
         * DECRYPTION UTILS
         */
        const POCKETBASE_URL = 'https://api.optictv.cloud';
        const AES_KEY = 'KOBANI_TV_SECURE_AES_KEY_2026_X0X'.substring(0, 32);
        const XOR_KEY = "KOBANI_TV_SECRET_2026";
        
        // CORS Proxy services to bypass CORS restrictions
        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        
        async function fetchWithCORS(url) {
            // Try direct first (might work if server has CORS)
            try {
                const response = await fetch(url, {
                    mode: 'cors',
                    credentials: 'omit'
                });
                if (response.ok) return url;
            } catch (e) {
                console.log('[CORS] Direct fetch failed, trying proxy');
            }
            
            // Try proxy services
            for (const proxy of CORS_PROXIES) {
                try {
                    const proxyUrl = proxy + encodeURIComponent(url);
                    const response = await fetch(proxyUrl, {
                        mode: 'cors',
                        credentials: 'omit'
                    });
                    if (response.ok) {
                        console.log('[CORS] Using proxy:', proxy);
                        return proxyUrl;
                    }
                } catch (e) {
                    console.log('[CORS] Proxy failed:', proxy);
                }
            }
            
            console.warn('[CORS] All proxy attempts failed, using direct URL');
            return url;
        }
        
        function decryptStreamUrl(encryptedUrl) {
            if (!encryptedUrl) return '';
            if (encryptedUrl.startsWith('http')) return encryptedUrl;
            
            console.log('[Decrypt] Input type:', encryptedUrl.substring(0, 20) + '...');
            
            // AES Decryption (GCM mode like Flutter app)
            if (encryptedUrl.startsWith('AES:')) {
                try {
                    const encryptedStr = encryptedUrl.substring(4);
                    const key = CryptoJS.enc.Utf8.parse(AES_KEY);
                    const iv = CryptoJS.lib.WordArray.create([0, 0, 0, 0]); 
                    
                    // Try GCM mode first (Flutter default)
                    try {
                        const decrypted = CryptoJS.AES.decrypt(encryptedStr, key, { 
                            iv: iv, 
                            mode: CryptoJS.mode.GCM, 
                            padding: CryptoJS.pad.Pkcs7 
                        });
                        const result = decrypted.toString(CryptoJS.enc.Utf8);
                        if (result && result.startsWith('http')) {
                            console.log('[Decrypt] AES-GCM success');
                            return result;
                        }
                    } catch (gcmError) {
                        console.log('[Decrypt] AES-GCM failed, trying CBC:', gcmError.message);
                        // Fallback to CBC mode
                        const decrypted = CryptoJS.AES.decrypt(encryptedStr, key, { 
                            iv: iv, 
                            mode: CryptoJS.mode.CBC, 
                            padding: CryptoJS.pad.Pkcs7 
                        });
                        const result = decrypted.toString(CryptoJS.enc.Utf8);
                        if (result && result.startsWith('http')) {
                            console.log('[Decrypt] AES-CBC success');
                            return result;
                        }
                    }
                } catch (e) { 
                    console.error('[Decrypt] AES Decryption failed:', e); 
                }
            }
            
            // Legacy XOR Decryption
            try {
                const decodedStr = atob(encryptedUrl);
                let result = "";
                for (let i = 0; i < decodedStr.length; i++) {
                    result += String.fromCharCode(decodedStr.charCodeAt(i) ^ XOR_KEY.charCodeAt(i % XOR_KEY.length));
                }
                if (result && result.startsWith('http')) {
                    console.log('[Decrypt] XOR success');
                    return result;
                }
            } catch (e) { 
                console.error('[Decrypt] XOR Decryption failed:', e); 
            }
            
            // Try base64 decode as last resort
            try {
                const result = atob(encryptedUrl);
                if (result && result.startsWith('http')) {
                    console.log('[Decrypt] Base64 success');
                    return result;
                }
            } catch (e) {
                console.error('[Decrypt] Base64 failed:', e);
            }
            
            console.warn('[Decrypt] All methods failed, returning original');
            // Return original if all decryptions fail
            return encryptedUrl;
        }

        /**
         * UNIVERSAL PLAYER (Plyr + hls.js — plays HLS, MP4, WebM, and everything)
         */
        class UniversalPlayer {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.player = null;
                this.hls = null;
                this.statsInterval = null;
                this.blobUrl = null;
                
                // Capture widgets HTML before container gets cleared
                this.widgetsHTML = document.querySelector('.player-widgets').outerHTML + 
                                   document.querySelector('.stats-widget').outerHTML;
            }

            async play(channel) {
                this.destroy();
                const originalUrl = channel.url;
                const url = decryptStreamUrl(channel.url);
                const referer = channel.referer;
                const userAgent = channel.user_agent;
                
                console.log('[UniversalPlayer] Original URL:', originalUrl);
                console.log('[UniversalPlayer] Decrypted URL:', url);
                console.log('[UniversalPlayer] URL changed:', originalUrl !== url);

                // Inject fresh video element + widgets
                this.container.innerHTML = `<video id="optVideo" playsinline controls crossorigin="anonymous"></video>` + this.widgetsHTML;
                app.bindPlayerWidgetEvents();
                document.getElementById('statEngine').textContent = 'PLYR + HLS.JS';

                const videoEl = document.getElementById('optVideo');
                const isHLS = url.includes('.m3u8') || url.includes('m3u8') || !url.match(/\.(mp4|webm|ogg|mkv)/);

                try {
                    if (isHLS && Hls.isSupported()) {
                        // === HLS STREAM ===
                        // Get proxied URL for CORS
                        const proxiedUrl = await fetchWithCORS(url);
                        console.log('[HLS] Using URL:', proxiedUrl === url ? 'Direct' : 'Proxied');
                        
                        this.hls = new Hls({
                            enableWorker: true,
                            lowLatencyMode: true,
                            liveSyncDurationCount: 3,
                            liveMaxLatencyDurationCount: 10,
                            maxBufferLength: 30,
                            maxMaxBufferLength: 60,
                            manifestLoadingTimeOut: 20000,
                            levelLoadingTimeOut: 20000,
                            fragLoadingTimeOut: 20000,
                            xhrSetup: function(xhr, u) {
                                try {
                                    // For proxied URLs, we don't need custom headers
                                    if (proxiedUrl === url) {
                                        if (referer) xhr.setRequestHeader('Referer', referer);
                                        if (userAgent) xhr.setRequestHeader('User-Agent', userAgent);
                                    }
                                } catch (e) { 
                                    console.warn('[Header] Could not set header:', e);
                                }
                            }
                        });
                        
                        this.hls.loadSource(proxiedUrl);
                        this.hls.attachMedia(videoEl);

                        this.hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                            console.log('[HLS] Manifest parsed, levels:', data.levels.length);
                            const qualities = this.hls.levels.map(l => l.height).filter(Boolean);
                            console.log('[HLS] Available qualities:', qualities);
                            
                            const plyrOpts = { 
                                autoplay: true,
                                muted: false,
                                volume: 1
                            };
                            
                            if (qualities.length > 0) {
                                plyrOpts.quality = {
                                    default: qualities[qualities.length - 1], // Highest quality by default
                                    options: qualities,
                                    forced: true,
                                    onChange: (q) => {
                                        this.hls.levels.forEach((l, idx) => {
                                            if (l.height === q) this.hls.currentLevel = idx;
                                        });
                                    }
                                };
                            }
                            
                            this.player = new Plyr(videoEl, plyrOpts);
                            this.player.play().catch(e => {
                                console.warn('[Plyr] Autoplay failed, trying with user interaction:', e);
                                // Try muted autoplay as fallback
                                this.player.muted = true;
                                this.player.play().catch(() => {});
                            });
                            this.startStats();
                        });

                        this.hls.on(Hls.Events.ERROR, (event, data) => {
                            console.error('[HLS Error]', data.type, data.details, data.fatal);
                            if (data.fatal) {
                                switch (data.type) {
                                    case Hls.ErrorTypes.NETWORK_ERROR:
                                        console.error('[HLS] Fatal network error');
                                        if (this.hls) {
                                            this.hls.networkRetry = (this.hls.networkRetry || 0) + 1;
                                            if (this.hls.networkRetry <= 5) {
                                                console.warn('[HLS] Retrying network load...');
                                                this.hls.startLoad();
                                            } else {
                                                console.error('[HLS] Max retries reached');
                                                this.showError('Network error - please check your connection');
                                            }
                                        }
                                        break;
                                    case Hls.ErrorTypes.MEDIA_ERROR:
                                        console.error('[HLS] Fatal media error');
                                        if (this.hls) {
                                            this.hls.recoverMediaError();
                                        }
                                        break;
                                    default:
                                        console.error('[HLS] Unrecoverable error, trying direct playback');
                                        this.hls.destroy();
                                        this.hls = null;
                                        // Try direct playback as last resort
                                        videoEl.src = url;
                                        this.player = new Plyr(videoEl, { autoplay: true });
                                        this.player.play().catch(() => {});
                                        break;
                                }
                            }
                        });

                    } else if (isHLS && videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                        // === NATIVE HLS (Safari/iOS) ===
                        console.log('[HLS] Using native HLS support');
                        videoEl.src = url;
                        this.player = new Plyr(videoEl, { autoplay: true });
                        this.player.play().catch(e => {
                            console.warn('[Native HLS] Autoplay failed:', e);
                            this.player.muted = true;
                            this.player.play().catch(() => {});
                        });
                        this.startStats();
                    } else {
                        // === DIRECT FILE (MP4, WebM, etc.) ===
                        console.log('[Player] Using direct file playback');
                        videoEl.src = url;
                        this.player = new Plyr(videoEl, { autoplay: true });
                        this.player.play().catch(e => {
                            console.warn('[Direct] Autoplay failed:', e);
                            this.player.muted = true;
                            this.player.play().catch(() => {});
                        });
                        this.startStats();
                    }
                } catch (e) {
                    console.error('[Player Fatal Error]', e);
                    this.showError('Playback failed: ' + e.message);
                    if (videoEl) {
                        videoEl.src = url;
                        videoEl.play().catch(() => {});
                    }
                }
            }

            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(239,68,68,0.9);color:white;padding:20px;border-radius:10px;text-align:center;z-index:100;';
                errorDiv.textContent = message;
                this.container.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 5000);
            }

            startStats() {
                const videoEl = document.getElementById('optVideo');
                this.statsInterval = setInterval(() => {
                    const resEl = document.getElementById('statRes');
                    const bufEl = document.getElementById('statBuffer');
                    
                    if (this.hls && this.hls.currentLevel >= 0) {
                        const level = this.hls.levels[this.hls.currentLevel];
                        if (level) {
                            if (resEl) resEl.textContent = `${level.width}x${level.height}`;
                            if (bufEl) bufEl.textContent = `${(level.bitrate / 1000000).toFixed(2)} Mbps`;
                        }
                    } else if (videoEl) {
                        // Fallback for Native HLS or MP4
                        if (resEl && videoEl.videoWidth) resEl.textContent = `${videoEl.videoWidth}x${videoEl.videoHeight}`;
                        if (bufEl) bufEl.textContent = `Native`;
                    }
                }, 2000);
            }

            destroy() {
                clearInterval(this.statsInterval);
                
                // CRITICAL FIX: Stop browser from downloading old video in background
                // Browsers have a limit of ~6 TCP connections per domain. 
                // If we don't abort the old video fetch, changing channels 6 times will freeze the browser.
                const oldVideo = document.getElementById('optVideo');
                if (oldVideo) {
                    oldVideo.pause();
                    oldVideo.removeAttribute('src'); // Detach source
                    oldVideo.load();                 // Abort active fetch
                }

                if (this.player) { try { this.player.destroy(); } catch(e){} }
                if (this.hls) { try { this.hls.destroy(); } catch(e){} }
                this.player = null;
                this.hls = null;
                this.container.innerHTML = '';
            }
        }

        /**
         * APP CONTROLLER
         */
        const app = {
            channels: [], filtered: [], 
            favs: new Set(JSON.parse(localStorage.getItem('optic_favs') || '[]')),
            lang: localStorage.getItem('optic_lang') || 'ku', // Default Kurdish
            category: 'all', query: '',
            player: null,

            init() {
                this.player = new UniversalPlayer('videoWrapper');
                
                // Initialize Selectors
                const langSelect = document.getElementById('langSelect');
                if(langSelect) langSelect.value = this.lang;

                this.updateUIStrings();
                this.bindEvents();
                this.setupIntersectionObserver();
                this.fetchData(); // Fetch data last
            },

            async fetchData() {
                try {
                    const res = await fetch(`${POCKETBASE_URL}/api/kobani-init`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        mode: 'cors'
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if(data && Array.isArray(data) && data.length) { 
                        this.parseData(data); 
                        return; 
                    }
                } catch (e) { 
                    console.warn('Fast init failed, trying records...', e); 
                }
                
                try {
                    const res = await fetch(`${POCKETBASE_URL}/api/collections/managedPlaylist/records?perPage=500`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        mode: 'cors'
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    this.parseData(data.items || []);
                } catch (e) {
                    console.error('All fetches failed, using mock data', e);
                    // Mock data for testing
                    this.parseData([
                        { id: 1, name: 'Kobani 4K Live', group: 'Sports', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 2, name: 'Kurdsat News', group: 'News', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
                        { id: 3, name: 'Movie Channel', group: 'Movies', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' }
                    ]);
                }
            },

            parseData(items) {
                this.channels = (Array.isArray(items) ? items : []).filter(c => c).map((c, i) => ({
                    id: String(c.id || `mock_${i}`), // Force string IDs for consistent lookups
                    name: c.name || 'Unknown Channel', 
                    group: c.group || c.category || 'General', url: c.url || '', 
                    logo: c.logo || c.icon_url || c.thumbnail || '',
                    category: (c.group || c.category || 'general').toLowerCase(),
                    user_agent: c.user_agent || c.userAgent || '',
                    referer: c.referer || ''
                }));
                // Build dynamic groups
                const groups = [...new Set(this.channels.map(c => c.group))].filter(Boolean);
                this.dynamicGroups = ['all', 'favorites', ...groups];
                
                this.updateUIStrings();
                this.applyFilters();
            },

            toggleFav(id, e) {
                e.stopPropagation();
                const strId = String(id);
                if(this.favs.has(strId)) this.favs.delete(strId);
                else this.favs.add(strId);
                localStorage.setItem('optic_favs', JSON.stringify([...this.favs]));
                this.applyFilters(); // Re-render to update heart states
            },

            applyFilters() {
                const q = this.query.toLowerCase();
                this.filtered = this.channels.filter(c => {
                    const nameMatch = c.name.toLowerCase().includes(q);
                    let catMatch = false;
                    if(this.category === 'favorites') catMatch = this.favs.has(c.id);
                    else if(this.category === 'all') catMatch = true;
                    else catMatch = c.category === this.category || c.group.toLowerCase() === this.category;
                    return nameMatch && catMatch;
                });
                this.renderGrid();
            },

            renderGrid() {
                const grid = document.getElementById('channelGrid');
                if(!this.filtered.length) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); font-size:1.2rem;">${dictionary[this.lang].noChannels}</div>`;
                    return;
                }

                // Generates HTML String for high performance insertion
                // Escape IDs and names to prevent XSS and quote-breaking
                const esc = (s) => String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                grid.innerHTML = this.filtered.map(c => `
                    <div class="channel-card lazy-card" onclick="app.openStream('${esc(c.id)}')">
                        <button class="fav-btn ${this.favs.has(c.id) ? 'active' : ''}" onclick="app.toggleFav('${esc(c.id)}', event)" title="Favorite">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                        <div class="card-thumb">
                            ${c.logo ? `
                                <div class="card-bg-blur lazy-bg" data-bg="${c.logo}"></div>
                                <img data-src="${c.logo}" class="logo-img lazy-img" alt="logo" onerror="this.style.display='none'">
                            ` : `<div style="font-size:4rem; z-index:1; opacity:0.3">📺</div>`}
                            <div class="play-overlay"><div class="play-button"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
                            <div class="live-tag"><div class="live-dot"></div><span>${dictionary[this.lang].live}</span></div>
                        </div>
                        <div class="card-info">
                            <div class="card-title">${c.name}</div>
                            <div class="card-group">${c.group}</div>
                        </div>
                    </div>
                `).join('');

                // Trigger Lazy Load Observer
                if(this.observer) {
                    document.querySelectorAll('.lazy-img, .lazy-bg').forEach(el => this.observer.observe(el));
                }
            },

            setupIntersectionObserver() {
                if ('IntersectionObserver' in window) {
                    this.observer = new IntersectionObserver((entries, obs) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const el = entry.target;
                                if(el.tagName === 'IMG' && el.dataset.src) {
                                    el.src = el.dataset.src;
                                } else if(el.dataset.bg) {
                                    el.style.backgroundImage = `url('${el.dataset.bg}')`;
                                }
                                obs.unobserve(el);
                            }
                        });
                    }, { rootMargin: '50px' });
                }
            },

            openStream(id) {
                const strId = String(id);
                const c = this.channels.find(x => x.id === strId);
                if(!c) {
                    console.error('Channel not found:', id);
                    return;
                }
                
                // Update Modal UI & Lock Background Scroll
                document.body.style.overflow = 'hidden';
                const titleEl = document.getElementById('playerTitle');
                if(titleEl) titleEl.textContent = c.name;
                const modalEl = document.getElementById('playerModal');
                if(modalEl) modalEl.classList.add('active');
                
                // Start Playback via Factory with error handling
                try {
                    this.player.play(c);
                } catch(e) {
                    console.error('Playback failed:', e);
                    this.closeStream();
                }

                // Populate Related Channels (same group, excluding self)
                const related = this.channels.filter(x => x.group === c.group && x.id !== c.id).slice(0, 15);
                const list = document.getElementById('relatedList');
                const esc = (s) => String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                list.innerHTML = related.map(r => `
                    <div class="related-item" onclick="app.openStream('${esc(r.id)}')">
                        <div class="related-thumb">
                            ${r.logo ? `<div class="related-blur" style="background-image:url('${r.logo}')"></div><img src="${r.logo}" onerror="this.style.display='none'">` : '📺'}
                        </div>
                        <div class="related-info">
                            <div class="related-title">${r.name}</div>
                            <div class="related-group">${r.group}</div>
                        </div>
                    </div>
                `).join('');
            },

            closeStream() {
                const modalEl = document.getElementById('playerModal');
                if(modalEl) modalEl.classList.remove('active');
                document.body.style.overflow = '';
                try {
                    this.player.destroy();
                } catch(e) {
                    console.error('Player destroy failed:', e);
                }
            },

            updateUIStrings() {
                const dict = dictionary[this.lang];
                
                // Update Desktop Filters Dynamically based on Pocketbase data
                const cats = this.dynamicGroups || ['all', 'favorites'];
                document.getElementById('categories').innerHTML = cats.map(c => {
                    const key = c.toLowerCase();
                    // Fallback to capitalizing the actual group name if no translation exists in dictionary
                    const label = dict[key] || c; 
                    return `<button class="filter-btn ${this.category === key ? 'active' : ''}" data-category="${key}">${label}</button>`;
                }).join('');

                // Update text elements via data-i18n
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if(dict[key]) {
                        if(el.tagName === 'INPUT') el.placeholder = dict[key];
                        else el.textContent = dict[key];
                    }
                });
                
                // Set body font based on lang
                document.body.style.fontFamily = this.lang === 'ku' ? "var(--font-primary)" : "var(--font-english)";
            },

            bindEvents() {
                // Escape key closes player modal
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && document.getElementById('playerModal').classList.contains('active')) {
                        this.closeStream();
                    }
                });

                // Click on backdrop (outside player-container) closes modal
                document.getElementById('playerModal').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('playerModal')) {
                        this.closeStream();
                    }
                });

                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => { 
                    this.query = e.target.value; this.applyFilters(); 
                });
                
                // Desktop Category Filters
                document.getElementById('categories').addEventListener('click', (e) => {
                    if(e.target.classList.contains('filter-btn')) {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.category = e.target.dataset.category;
                        
                        // Sync with mobile nav
                        document.querySelectorAll('.bottom-nav .nav-item').forEach(b => b.classList.remove('active'));
                        const mobileMatch = document.querySelector(`.bottom-nav .nav-item[data-nav="${this.category}"]`);
                        if(mobileMatch) mobileMatch.classList.add('active');

                        this.applyFilters();
                    }
                });

                // Mobile Nav Filters
                document.querySelectorAll('.bottom-nav .nav-item').forEach(nav => {
                    nav.addEventListener('click', (e) => {
                        const target = e.currentTarget;
                        document.querySelectorAll('.bottom-nav .nav-item').forEach(b => b.classList.remove('active'));
                        target.classList.add('active');
                        
                        const navCat = target.dataset.nav;
                        this.category = navCat === 'all' ? 'all' : navCat;
                        
                        // Sync with desktop
                        document.querySelectorAll('.filter-btn').forEach(b => {
                            b.classList.remove('active');
                            if(b.dataset.category === this.category) b.classList.add('active');
                        });

                        this.applyFilters();
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    });
                });

                // Language Select
                document.getElementById('langSelect').addEventListener('change', (e) => {
                    this.lang = e.target.value;
                    localStorage.setItem('optic_lang', this.lang);
                    this.updateUIStrings();
                    this.renderGrid();
                });
            },

            // Called dynamically by factory after DOM injection
            bindPlayerWidgetEvents() {
                const closeBtn = document.getElementById('closePlayerBtn');
                const statsBtn = document.getElementById('toggleStatsBtn');
                if(closeBtn) closeBtn.onclick = () => this.closeStream();
                if(statsBtn) {
                    statsBtn.onclick = () => {
                        const w = document.getElementById('statsWidget');
                        if(w) w.classList.toggle('active');
                    };
                }
            }
        };

        // Bootstrap Application
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW Register Failed', err));
            }
        });
    </script>
</body>
</html>
