<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>OpticTV · Admin Console</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
  <style>
    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 240 10% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 263.4 70% 50.4%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 263.4 70% 50.4%;
      --radius: 0.75rem;
      --sidebar-w: 240px;
    }

    body[data-theme="light"] {
      --background: 0 0% 97%;
      --foreground: 240 10% 8%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 8%;
      --secondary: 240 5% 92%;
      --secondary-foreground: 240 10% 8%;
      --muted: 240 5% 92%;
      --muted-foreground: 240 4% 40%;
      --border: 240 6% 85%;
      --input: 240 6% 90%;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #09090b 0%, #1a1025 50%, #0f0f1a 100%);
      color: hsl(var(--foreground));
      min-height: 100vh;
      padding: 0;
      position: relative;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body[data-theme="light"] {
      background: linear-gradient(135deg, #f4f4f7 0%, #ece6f7 50%, #eef1fb 100%);
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(139,92,246,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 20%, rgba(59,130,246,0.05) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(236,72,153,0.04) 0%, transparent 50%);
      z-index: 0; pointer-events: none;
    }

    a { color: inherit; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(var(--muted)); border-radius: 10px; }

    /* App Shell */
    .shell {
      position: relative; z-index: 1;
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: hsl(var(--card) / 0.7);
      backdrop-filter: blur(20px);
      border-right: 1px solid hsl(var(--border) / 0.5);
      display: flex; flex-direction: column;
      padding: 20px 14px;
      gap: 4px;
      position: sticky; top: 0; height: 100vh;
      transition: transform 0.25s ease;
      z-index: 40;
    }

    .sidebar-brand {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 8px 20px;
    }

    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; flex: 1; overflow-y: auto; }

    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px;
      color: hsl(var(--muted-foreground));
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: none; background: transparent;
      width: 100%; text-align: left;
      transition: all 0.15s;
    }

    .sidebar-link i { width: 17px; height: 17px; flex-shrink: 0; }

    .sidebar-link:hover { background: hsl(var(--secondary) / 0.6); color: hsl(var(--foreground)); }

    .sidebar-link.active {
      background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(139,92,246,0.05));
      color: #c4b5fd;
      box-shadow: inset 0 0 0 1px rgba(139,92,246,0.25);
    }

    .sidebar-link .sidebar-badge {
      margin-left: auto;
      font-size: 0.65rem; padding: 1px 7px; border-radius: 9999px;
      background: hsl(var(--secondary));
    }

    .sidebar-footer {
      border-top: 1px solid hsl(var(--border) / 0.4);
      padding-top: 12px; margin-top: 8px;
      font-size: 0.7rem; color: hsl(var(--muted-foreground));
      display: flex; flex-direction: column; gap: 6px;
    }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 35;
    }

    .menu-toggle {
      display: none;
      background: hsl(var(--secondary)); border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground)); border-radius: 8px; padding: 8px;
      cursor: pointer;
    }

    .main-area {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 14px 24px;
      background: hsl(var(--card) / 0.5);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid hsl(var(--border) / 0.4);
      position: sticky; top: 0; z-index: 20;
      flex-wrap: wrap;
    }

    .topbar-title { display: flex; flex-direction: column; }
    .topbar-title h2 { font-size: 1.05rem; font-weight: 700; }
    .topbar-title span { font-size: 0.72rem; color: hsl(var(--muted-foreground)); }

    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .content-area {
      padding: 20px 24px 60px;
      max-width: 1500px; width: 100%; margin: 0 auto;
    }

    /* Login Screen */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative; z-index: 1;
    }

    .login-card {
      background: hsl(var(--card) / 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid hsl(var(--border) / 0.5);
      border-radius: calc(var(--radius) + 8px);
      padding: clamp(24px, 4vw, 40px);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .login-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-card p {
      color: hsl(var(--muted-foreground));
      text-align: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .login-mode-toggle {
      display: flex; gap: 6px; margin-bottom: 18px;
      background: hsl(var(--secondary) / 0.5); border-radius: 8px; padding: 4px;
    }

    .login-mode-toggle button {
      flex: 1; padding: 7px; border: none; border-radius: 6px;
      background: transparent; color: hsl(var(--muted-foreground));
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }

    .login-mode-toggle button.active { background: hsl(var(--primary)); color: white; }

    .login-error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 10px 12px; border-radius: 8px;
      font-size: 0.78rem; margin-bottom: 14px; display: flex; gap: 8px; align-items: flex-start;
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(139,92,246,0.4);
      flex-shrink: 0;
    }

    .brand-icon i { color: white; width: 20px; height: 20px; }

    .brand-text h1 {
      font-size: 1.15rem; font-weight: 700;
      background: linear-gradient(to right, #e0e7ff, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .brand-text span {
      font-size: 0.68rem; color: hsl(var(--muted-foreground)); font-weight: 500;
    }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.8rem; flex-shrink: 0;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: clamp(12px, 2vw, 16px);
      margin-bottom: 20px;
    }

    .stat-card {
      background: hsl(var(--card) / 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid hsl(var(--border) / 0.5);
      border-radius: calc(var(--radius) + 4px);
      padding: clamp(14px, 2vw, 20px);
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }

    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899, #3b82f6);
      opacity: 0; transition: opacity 0.3s;
    }

    .stat-card:hover::before { opacity: 1; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(139,92,246,0.15); }

    .stat-content { display: flex; align-items: flex-start; justify-content: space-between; }
    .stat-info h3 { font-size: 0.75rem; font-weight: 500; color: hsl(var(--muted-foreground)); margin-bottom: 6px; }
    .stat-value { font-size: clamp(1.4rem, 2.5vw, 1.8rem); font-weight: 700; letter-spacing: -1px; }
    .stat-trend { font-size: 0.68rem; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: hsl(var(--secondary));
    }
    .stat-icon i { width: 18px; height: 18px; }

    /* Grids */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr));
      gap: clamp(16px, 2vw, 20px);
    }

    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .card {
      background: hsl(var(--card) / 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid hsl(var(--border) / 0.5);
      border-radius: calc(var(--radius) + 4px);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid hsl(var(--border) / 0.3);
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }

    .card-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9rem; }
    .card-title i { width: 18px; height: 18px; color: #8b5cf6; }
    .card-subtitle { font-size: 0.72rem; color: hsl(var(--muted-foreground)); margin-top: 2px; }

    .badge {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
      padding: 3px 10px; border-radius: 9999px;
      font-size: 0.7rem; font-weight: 500;
      white-space: nowrap;
    }
    .badge-success { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-danger { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-warn { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-info { background: rgba(59,130,246,0.15); color: #60a5fa; }

    .card-body { padding: 16px 20px 20px; }
    .card-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 14px 20px 0; }

    /* Lists & tables */
    .scroll-list { display: flex; flex-direction: column; gap: 6px; max-height: 340px; overflow-y: auto; padding-right: 4px; }

    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 10px;
      background: hsl(var(--secondary) / 0.3);
      border: 1px solid transparent;
      transition: all 0.2s; gap: 10px; flex-wrap: wrap;
    }
    .list-item:hover { background: hsl(var(--secondary)); border-color: hsl(var(--border)); }
    .list-item-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .list-item-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.6); flex-shrink: 0; }
    .list-item-name { font-weight: 500; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-item-sub { font-size: 0.7rem; color: hsl(var(--muted-foreground)); }
    .tag {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 9999px;
      background: hsl(var(--primary) / 0.15); color: #c4b5fd; font-weight: 500; white-space: nowrap;
    }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th {
      text-align: left; padding: 8px 10px; color: hsl(var(--muted-foreground));
      font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em;
      border-bottom: 1px solid hsl(var(--border));
      position: sticky; top: 0; background: hsl(var(--card));
    }
    .data-table td { padding: 9px 10px; border-bottom: 1px solid hsl(var(--border) / 0.4); vertical-align: middle; }
    .data-table tr:hover td { background: hsl(var(--secondary) / 0.3); }
    .table-wrap { overflow-x: auto; max-height: 460px; overflow-y: auto; border-radius: 10px; border: 1px solid hsl(var(--border) / 0.4); }

    .empty-state { text-align: center; padding: 34px 12px; color: hsl(var(--muted-foreground)); }
    .empty-state i { width: 34px; height: 34px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 0.82rem; }

    /* Buttons */
    .btn-group { display: inline-flex; border-radius: 8px; overflow: hidden; border: 1px solid hsl(var(--border)); flex-wrap: wrap; }
    .btn-ghost {
      padding: 7px 12px; background: transparent; border: none;
      color: hsl(var(--foreground)); cursor: pointer;
      font-size: 0.75rem; font-weight: 500;
      transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    }
    .btn-ghost.active { background: hsl(var(--primary)); color: white; }
    .btn-ghost:not(.active):hover { background: hsl(var(--secondary)); }

    .input, .select, textarea.input {
      width: 100%; padding: 10px 14px;
      background: hsl(var(--input)); border: 1px solid hsl(var(--border));
      border-radius: 8px; color: hsl(var(--foreground));
      font-size: 0.85rem; outline: none; transition: all 0.2s;
      font-family: inherit;
    }
    .input:focus, .select:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15); }
    .select { cursor: pointer; }
    .input-group { position: relative; }
    .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: hsl(var(--muted-foreground)); }
    .input-group .input { padding-left: 36px; }
    .field-label { font-size: 0.72rem; font-weight: 600; color: hsl(var(--muted-foreground)); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.03em; }
    .field-group { margin-bottom: 14px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .field-row { grid-template-columns: 1fr; } }
    .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; cursor: pointer; user-select: none; }
    .checkbox-row input { width: 16px; height: 16px; accent-color: #8b5cf6; cursor: pointer; }

    .btn {
      padding: 10px 16px; border-radius: 8px;
      font-weight: 500; font-size: 0.85rem; cursor: pointer;
      transition: all 0.2s; border: none;
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: hsl(var(--primary)); color: white; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
    .btn-primary:hover:not(:disabled) { background: #7c3aed; box-shadow: 0 6px 20px rgba(139,92,246,0.4); }
    .btn-outline { background: transparent; border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); }
    .btn-outline:hover:not(:disabled) { background: hsl(var(--secondary)); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.28); }
    .btn-sm { padding: 6px 10px; font-size: 0.7rem; }
    .btn-xs { padding: 3px 8px; font-size: 0.65rem; border-radius: 6px; }
    .btn-block { width: 100%; justify-content: center; }
    .btn i { width: 15px; height: 15px; }
    .icon-btn { padding: 7px; border-radius: 7px; }
    .icon-btn i { width: 13px; height: 13px; }

    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .ml-2 { margin-left: 8px; }
    .text-muted { color: hsl(var(--muted-foreground)); font-size: 0.8rem; }
    .text-success { color: #22c55e; } .text-danger { color: #ef4444; } .text-warn { color: #f59e0b; }
    .text-sm { font-size: 0.8rem; } .text-xs { font-size: 0.7rem; }
    .text-right { text-align: right; }
    .fw-600 { font-weight: 600; }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.active { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
    .status-dot.inactive { background: #ef4444; }

    .code-font { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; font-weight: 500; }
    .divider { border-top: 1px solid hsl(var(--border) / 0.3); margin: 14px 0; }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
    .pagination button {
      min-width: 30px; height: 30px; border-radius: 7px; border: 1px solid hsl(var(--border));
      background: hsl(var(--secondary) / 0.3); color: hsl(var(--foreground));
      font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
    }
    .pagination button.active { background: hsl(var(--primary)); color: white; border-color: transparent; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination button:hover:not(:disabled):not(.active) { background: hsl(var(--secondary)); }

    /* Toast */
    .toast-stack { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; max-width: calc(100vw - 32px); }
    .toast {
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      padding: 14px 16px; border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.3s ease;
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.83rem; max-width: 380px;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .loading-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton { background: linear-gradient(90deg, hsl(var(--secondary)) 25%, hsl(var(--muted) / 0.4) 37%, hsl(var(--secondary)) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
    .skeleton-row { height: 44px; margin-bottom: 6px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      padding: 20px; animation: fadeIn 0.15s ease;
    }
    .modal {
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: calc(var(--radius) + 6px); width: 100%; max-width: 620px;
      max-height: 88vh; display: flex; flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid hsl(var(--border) / 0.4); }
    .modal-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-close { background: hsl(var(--secondary)); border: none; color: hsl(var(--foreground)); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 20px 22px; overflow-y: auto; }
    .modal-footer { padding: 16px 22px; border-top: 1px solid hsl(var(--border) / 0.4); display: flex; justify-content: flex-end; gap: 10px; }
    .modal-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: hsl(var(--secondary) / 0.4); padding: 4px; border-radius: 8px; flex-wrap: wrap; }
    .modal-tab { flex: 1; padding: 7px 10px; border: none; background: transparent; border-radius: 6px; font-size: 0.72rem; font-weight: 600; color: hsl(var(--muted-foreground)); cursor: pointer; min-width: 90px; }
    .modal-tab.active { background: hsl(var(--primary)); color: white; }

    .confirm-modal .modal { max-width: 400px; }
    .confirm-icon { width: 46px; height: 46px; border-radius: 50%; background: rgba(239,68,68,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .confirm-icon i { width: 22px; height: 22px; color: #ef4444; }

    /* Charts (lightweight, no external lib) */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 140px; padding-top: 10px; }
    .bar-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bar-chart-bar { width: 100%; max-width: 26px; border-radius: 5px 5px 0 0; background: linear-gradient(180deg, #a78bfa, #6d28d9); min-height: 3px; transition: height 0.4s ease; }
    .bar-chart-label { font-size: 0.62rem; color: hsl(var(--muted-foreground)); white-space: nowrap; }
    .hbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .hbar-track { flex: 1; height: 8px; background: hsl(var(--secondary)); border-radius: 6px; overflow: hidden; }
    .hbar-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 6px; }
    .hbar-name { width: 130px; font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .hbar-value { width: 44px; text-align: right; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }

    .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .conn-dot.ok { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.7); }
    .conn-dot.bad { background: #ef4444; }
    .conn-dot.checking { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    .kbd { font-family: monospace; background: hsl(var(--secondary)); border: 1px solid hsl(var(--border)); border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); box-shadow: 0 0 60px rgba(0,0,0,0.5); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .menu-toggle { display: flex; align-items: center; justify-content: center; }
    }

    @media (max-width: 640px) {
      .topbar { padding: 12px 14px; }
      .content-area { padding: 14px 14px 50px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card { padding: 12px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast-stack" id="toastStack"></div>

  <script>
    // ════════════════════════════════════════════════════════════
    // PocketBase Configuration
    // ════════════════════════════════════════════════════════════
    const PB_URL = 'https://api.optictv.cloud';
    const pb = new PocketBase(PB_URL);

    // ════════════════════════════════════════════════════════════
    // Global State
    // ════════════════════════════════════════════════════════════
    let currentUser = null;
    let authCollection = null; // '_superusers' or 'users' — whichever authenticated
    let currentTab = 'dashboard';
    let sidebarOpen = false;
    let theme = 'dark';

    let channels = [];
    let channelGroups = [];
    let loginCodes = [];
    let announcements = [];
    let broadcasts = [];
    let updateRecords = [];       // full history
    let updateConfig = null;      // active one
    let adminLogs = [];
    let analyticsChannelViews = [];
    let analyticsViewsDaily = [];
    let analyticsViewsTotal = 0;

    let sortMode = 'name';
    let isLoading = false;
    let dataLoadedOnce = false;

    // Channels tab state
    let channelSearch = '';
    let channelFilterGroup = '';
    let channelFilterType = '';
    let channelPage = 1;
    const CHANNELS_PER_PAGE = 12;
    let selectedChannelIds = new Set();
    let editingChannel = null;   // record being edited, or {} for new
    let channelModalTab = 'basic';

    // Codes tab state
    let codeSearch = '';
    let codesPage = 1;
    const CODES_PER_PAGE = 10;

    // Logs tab state
    let logsPage = 1;
    const LOGS_PER_PAGE = 15;

    // Modal / confirm state
    let activeModal = null;      // 'channel' | 'group' | null
    let editingGroup = null;
    let confirmState = null;     // { title, message, onConfirm }
    let connStatus = 'checking'; // ok | bad | checking

    // ════════════════════════════════════════════════════════════
    // Small helpers
    // ════════════════════════════════════════════════════════════
    function esc(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      const toast = document.createElement('div');
      toast.className = 'toast';
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info';
      const color = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#f59e0b';
      toast.innerHTML = `
        <i data-lucide="${icon}" style="width:18px;height:18px;color:${color};flex-shrink:0;margin-top:1px;"></i>
        <span>${esc(message)}</span>
      `;
      stack.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 3800);
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      if (isNaN(d)) return 'N/A';
      const now = new Date();
      const diff = now - d;
      const mins = Math.floor(diff / 60000);
      const hrs = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (diff < 0) return d.toLocaleString();
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      if (hrs < 24) return `${hrs}h ago`;
      if (days < 7) return `${days}d ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatFullDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      if (isNaN(d)) return 'N/A';
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function generateRandomCode(len = 8) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let out = '';
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    function debounce(fn, wait) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    }

    function setTab(tab) {
      currentTab = tab;
      sidebarOpen = false;
      channelPage = 1;
      codesPage = 1;
      logsPage = 1;
      renderApp();
    }

    function openConfirm(title, message, onConfirm, danger = true) {
      confirmState = { title, message, onConfirm, danger };
      renderModals();
    }

    function closeConfirm() {
      confirmState = null;
      renderModals();
    }

    async function runConfirm() {
      if (!confirmState) return;
      const fn = confirmState.onConfirm;
      confirmState = null;
      renderModals();
      await fn();
    }

    // ════════════════════════════════════════════════════════════
    // Admin activity logging (best-effort — never blocks the UI)
    // ════════════════════════════════════════════════════════════
    async function logAction(action, details) {
      try {
        await pb.collection('adminLogs').create({
          user: currentUser?.email || 'unknown',
          action,
          details: typeof details === 'string' ? details : JSON.stringify(details || {})
        });
      } catch (err) {
        // Logging is non-critical; swallow errors quietly (e.g. rule restrictions)
        console.warn('Could not write admin log:', err?.message || err);
      }
    }

    // ════════════════════════════════════════════════════════════
    // Connection health check
    // ════════════════════════════════════════════════════════════
    async function checkConnection() {
      connStatus = 'checking';
      try {
        await pb.health.check();
        connStatus = 'ok';
      } catch (err) {
        connStatus = 'bad';
      }
      const el = document.getElementById('connIndicator');
      if (el) el.outerHTML = renderConnIndicator();
    }

    function renderConnIndicator() {
      const label = connStatus === 'ok' ? 'Connected' : connStatus === 'bad' ? 'Offline' : 'Checking…';
      return `<span id="connIndicator" class="flex-row" style="gap:6px;" title="${PB_URL}">
        <span class="conn-dot ${connStatus === 'ok' ? 'ok' : connStatus === 'bad' ? 'bad' : 'checking'}"></span>
        <span class="text-xs text-muted">${label}</span>
      </span>`;
    }

    // ════════════════════════════════════════════════════════════
    // Data Fetching
    // ════════════════════════════════════════════════════════════
    async function fetchAllData() {
      isLoading = true;
      try {
        const results = await Promise.allSettled([
          pb.collection('managedPlaylist').getFullList({ sort: 'order' }).catch(() => pb.collection('managedPlaylist').getFullList()).catch(e => { console.error('managedPlaylist fetch error:', e); return []; }),
          pb.collection('channelGroups').getFullList({ sort: 'order' }).catch(() => pb.collection('channelGroups').getFullList()).catch(e => { console.error('channelGroups fetch error:', e); return []; }),
          pb.collection('loginCodes').getFullList({ sort: '-created' }).catch(() => pb.collection('loginCodes').getFullList()).catch(e => { console.error('loginCodes fetch error:', e); return []; }),
          pb.collection('announcements').getFullList().catch(e => { console.error('announcements fetch error:', e); return []; }),
          pb.collection('broadcasts').getFullList({ sort: '-timestamp' }).catch(() => pb.collection('broadcasts').getFullList()).catch(e => { console.error('broadcasts fetch error:', e); return []; }),
          pb.collection('updateManager').getFullList({ sort: '-versionCode' }).catch(() => pb.collection('updateManager').getFullList()).catch(e => { console.error('updateManager fetch error:', e); return []; }),
          pb.collection('adminLogs').getFullList({ sort: '-created' }).catch(() => pb.collection('adminLogs').getFullList()).catch(() => []),
          pb.collection('analytics_channel_views').getFullList({ sort: '-total' }).catch(() => pb.collection('analytics_channel_views').getFullList()).catch(() => []),
          pb.collection('analytics_views_daily').getFullList({ sort: 'date' }).catch(() => pb.collection('analytics_views_daily').getFullList()).catch(() => []),
          pb.collection('analytics_views_total').getFullList().catch(() => []),
        ]);

        const [
          playlistRes, groupsRes, codesRes, announcementsRes, broadcastsRes,
          updateRes, logsRes, chViewsRes, dailyViewsRes, totalViewsRes
        ] = results;

        channels = playlistRes.status === 'fulfilled' ? playlistRes.value : [];
        channelGroups = groupsRes.status === 'fulfilled' ? groupsRes.value : [];
        loginCodes = codesRes.status === 'fulfilled' ? codesRes.value : [];
        announcements = announcementsRes.status === 'fulfilled' ? announcementsRes.value : [];
        broadcasts = broadcastsRes.status === 'fulfilled' ? broadcastsRes.value : [];
        updateRecords = updateRes.status === 'fulfilled' ? updateRes.value : [];
        updateConfig = updateRecords.find(u => u.active) || null;
        adminLogs = logsRes.status === 'fulfilled' ? logsRes.value : [];
        analyticsChannelViews = chViewsRes.status === 'fulfilled' ? chViewsRes.value : [];
        analyticsViewsDaily = dailyViewsRes.status === 'fulfilled' ? dailyViewsRes.value : [];
        analyticsViewsTotal = (totalViewsRes.status === 'fulfilled' && totalViewsRes.value[0]) ? (totalViewsRes.value[0].total || 0) : 0;

        const failed = results.filter(r => r.status === 'rejected').length;
        if (failed > 0 && failed < 6) {
          console.warn(`${failed} collection(s) failed to load — check permissions.`);
        }
        dataLoadedOnce = true;
      } catch (err) {
        console.error('Fetch error:', err);
        showToast('Failed to load some data: ' + (err?.message || err), 'error');
      } finally {
        isLoading = false;
      }
    }

    async function refreshAndRender() {
      await fetchAllData();
      renderApp();
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Channels (managedPlaylist)
    // ════════════════════════════════════════════════════════════
    async function createChannel(data) {
      try {
        const maxOrder = channels.length > 0 ? Math.max(...channels.map(c => c.order || 0)) : 0;
        const payload = Object.assign({ order: maxOrder + 1 }, data);
        const rec = await pb.collection('managedPlaylist').create(payload);
        await logAction('create_channel', { id: rec.id, name: rec.name });
        await refreshAndRender();
        showToast(`Channel "${data.name}" added`);
      } catch (err) {
        showToast('Failed to add channel: ' + (err?.message || err), 'error');
      }
    }

    async function updateChannel(id, data) {
      try {
        const rec = await pb.collection('managedPlaylist').update(id, data);
        await logAction('update_channel', { id, fields: Object.keys(data) });
        await refreshAndRender();
        showToast(`Channel "${data.name || rec.name}" updated`);
      } catch (err) {
        showToast('Failed to update channel: ' + (err?.message || err), 'error');
      }
    }

    async function deleteChannel(id) {
      const ch = channels.find(c => c.id === id);
      openConfirm(
        'Delete channel?',
        `This will permanently remove "${ch?.name || 'this channel'}" from the playlist. This cannot be undone.`,
        async () => {
          try {
            await pb.collection('managedPlaylist').delete(id);
            await logAction('delete_channel', { id, name: ch?.name });
            selectedChannelIds.delete(id);
            await refreshAndRender();
            showToast('Channel deleted');
          } catch (err) {
            showToast('Failed to delete: ' + (err?.message || err), 'error');
          }
        }
      );
    }

    async function bulkDeleteChannels() {
      if (selectedChannelIds.size === 0) return;
      const count = selectedChannelIds.size;
      openConfirm(
        `Delete ${count} channel${count > 1 ? 's' : ''}?`,
        'This will permanently remove all selected channels. This cannot be undone.',
        async () => {
          const ids = Array.from(selectedChannelIds);
          let ok = 0;
          for (const id of ids) {
            try { await pb.collection('managedPlaylist').delete(id); ok++; } catch (err) { /* continue */ }
          }
          await logAction('bulk_delete_channels', { count: ok });
          selectedChannelIds.clear();
          await refreshAndRender();
          showToast(`${ok} channel${ok > 1 ? 's' : ''} deleted`);
        }
      );
    }

    async function reorderChannel(id, direction) {
      const sorted = [...channels].sort((a, b) => (a.order || 0) - (b.order || 0));
      const idx = sorted.findIndex(c => c.id === id);
      const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (idx === -1 || swapIdx < 0 || swapIdx >= sorted.length) return;
      const a = sorted[idx], b = sorted[swapIdx];
      const aOrder = a.order || 0, bOrder = b.order || 0;
      try {
        await pb.collection('managedPlaylist').update(a.id, { order: bOrder });
        await pb.collection('managedPlaylist').update(b.id, { order: aOrder });
        await refreshAndRender();
      } catch (err) {
        showToast('Failed to reorder: ' + (err?.message || err), 'error');
      }
    }

    function exportChannelsJSON() {
      const blob = new Blob([JSON.stringify(channels, null, 2)], { type: 'application/json' });
      downloadBlob(blob, 'optictv-channels.json');
      showToast('Exported channels as JSON');
    }

    function exportChannelsM3U() {
      let m3u = '#EXTM3U\n';
      channels.forEach(ch => {
        m3u += `#EXTINF:-1 group-title="${ch.group || 'General'}" tvg-logo="${ch.logo || ''}",${ch.name || 'Unnamed'}\n`;
        m3u += `${ch.url || ''}\n`;
      });
      const blob = new Blob([m3u], { type: 'audio/x-mpegurl' });
      downloadBlob(blob, 'optictv-playlist.m3u');
      showToast('Exported playlist as M3U');
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Channel Groups
    // ════════════════════════════════════════════════════════════
    async function createGroup(name) {
      try {
        const maxOrder = channelGroups.length > 0 ? Math.max(...channelGroups.map(g => g.order || 0)) : 0;
        await pb.collection('channelGroups').create({ name, order: maxOrder + 1 });
        await logAction('create_group', { name });
        await refreshAndRender();
        showToast(`Group "${name}" created`);
      } catch (err) {
        showToast('Failed to create group: ' + (err?.message || err), 'error');
      }
    }

    async function renameGroup(id, name) {
      try {
        await pb.collection('channelGroups').update(id, { name });
        await logAction('rename_group', { id, name });
        await refreshAndRender();
        showToast('Group renamed');
      } catch (err) {
        showToast('Failed to rename group: ' + (err?.message || err), 'error');
      }
    }

    async function deleteGroup(id) {
      const g = channelGroups.find(x => x.id === id);
      const inUse = channels.filter(c => c.group === g?.name).length;
      openConfirm(
        'Delete group?',
        inUse > 0
          ? `"${g?.name}" is used by ${inUse} channel(s). Deleting it won't remove those channels, but they'll show as ungrouped.`
          : `This will permanently remove the "${g?.name}" group.`,
        async () => {
          try {
            await pb.collection('channelGroups').delete(id);
            await logAction('delete_group', { id, name: g?.name });
            await refreshAndRender();
            showToast('Group deleted');
          } catch (err) {
            showToast('Failed to delete group: ' + (err?.message || err), 'error');
          }
        }
      );
    }

    async function reorderGroup(id, direction) {
      const sorted = [...channelGroups].sort((a, b) => (a.order || 0) - (b.order || 0));
      const idx = sorted.findIndex(g => g.id === id);
      const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (idx === -1 || swapIdx < 0 || swapIdx >= sorted.length) return;
      const a = sorted[idx], b = sorted[swapIdx];
      const aOrder = a.order || 0, bOrder = b.order || 0;
      try {
        await pb.collection('channelGroups').update(a.id, { order: bOrder });
        await pb.collection('channelGroups').update(b.id, { order: aOrder });
        await refreshAndRender();
      } catch (err) {
        showToast('Failed to reorder groups: ' + (err?.message || err), 'error');
      }
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Login Codes
    // ════════════════════════════════════════════════════════════
    async function generateCode(code) {
      try {
        await pb.collection('loginCodes').create({ code, active: true, lockedDeviceId: '' });
        await logAction('generate_code', { code });
        await refreshAndRender();
        showToast(`Code "${code}" generated`);
      } catch (err) {
        showToast('Failed to generate code: ' + (err?.message || err), 'error');
      }
    }

    async function bulkGenerateCodes(count) {
      let ok = 0;
      for (let i = 0; i < count; i++) {
        try {
          await pb.collection('loginCodes').create({ code: generateRandomCode(), active: true, lockedDeviceId: '' });
          ok++;
        } catch (err) { /* continue */ }
      }
      await logAction('bulk_generate_codes', { count: ok });
      await refreshAndRender();
      showToast(`${ok} code${ok > 1 ? 's' : ''} generated`);
    }

    async function toggleCodeActive(id, currentActive) {
      try {
        await pb.collection('loginCodes').update(id, { active: !currentActive });
        await logAction('toggle_code', { id, active: !currentActive });
        await refreshAndRender();
        showToast(`Code ${!currentActive ? 'activated' : 'revoked'}`);
      } catch (err) {
        showToast('Failed to update code: ' + (err?.message || err), 'error');
      }
    }

    async function unlockCodeDevice(id) {
      try {
        await pb.collection('loginCodes').update(id, { lockedDeviceId: '' });
        await logAction('unlock_code_device', { id });
        await refreshAndRender();
        showToast('Device unlocked from code');
      } catch (err) {
        showToast('Failed to unlock device: ' + (err?.message || err), 'error');
      }
    }

    async function deleteCode(id) {
      openConfirm(
        'Delete login code?',
        'Any device currently signed in with this code will be signed out. This cannot be undone.',
        async () => {
          try {
            await pb.collection('loginCodes').delete(id);
            await logAction('delete_code', { id });
            await refreshAndRender();
            showToast('Code deleted');
          } catch (err) {
            showToast('Failed to delete code: ' + (err?.message || err), 'error');
          }
        }
      );
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Announcements
    // ════════════════════════════════════════════════════════════
    async function toggleAnnouncement(id, currentActive) {
      try {
        await pb.collection('announcements').update(id, { active: !currentActive });
        await logAction('toggle_announcement', { id, active: !currentActive });
        await refreshAndRender();
        showToast(`Announcement ${!currentActive ? 'activated' : 'deactivated'}`);
      } catch (err) {
        showToast('Failed to update: ' + (err?.message || err), 'error');
      }
    }

    async function createAnnouncement(text) {
      try {
        await pb.collection('announcements').create({ text, active: true });
        await logAction('create_announcement', { text });
        await refreshAndRender();
        showToast('Announcement created');
      } catch (err) {
        showToast('Failed to create announcement: ' + (err?.message || err), 'error');
      }
    }

    async function deleteAnnouncement(id) {
      openConfirm('Delete announcement?', 'This will permanently remove this announcement.', async () => {
        try {
          await pb.collection('announcements').delete(id);
          await logAction('delete_announcement', { id });
          await refreshAndRender();
          showToast('Announcement deleted');
        } catch (err) {
          showToast('Failed to delete: ' + (err?.message || err), 'error');
        }
      });
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Broadcasts
    // ════════════════════════════════════════════════════════════
    async function sendBroadcast(title, body, image) {
      try {
        await pb.collection('broadcasts').create({
          title, body, image: image || '', timestamp: new Date().toISOString()
        });
        await logAction('send_broadcast', { title });
        await refreshAndRender();
        showToast('Broadcast sent!');
      } catch (err) {
        showToast('Failed to send: ' + (err?.message || err), 'error');
      }
    }

    async function deleteBroadcast(id) {
      openConfirm('Delete broadcast?', 'This removes it from history. Devices that already received it are unaffected.', async () => {
        try {
          await pb.collection('broadcasts').delete(id);
          await logAction('delete_broadcast', { id });
          await refreshAndRender();
          showToast('Broadcast deleted');
        } catch (err) {
          showToast('Failed to delete: ' + (err?.message || err), 'error');
        }
      });
    }

    async function resendBroadcast(id) {
      const b = broadcasts.find(x => x.id === id);
      if (!b) return;
      await sendBroadcast(b.title, b.body, b.image);
    }

    // ════════════════════════════════════════════════════════════
    // CRUD — Update Manager
    // ════════════════════════════════════════════════════════════
    async function pushUpdate(apkUrl, versionCode, versionName, releaseNotes) {
      try {
        // Deactivate all existing update records first
        const existing = await pb.collection('updateManager').getFullList();
        for (const u of existing) {
          if (u.active) await pb.collection('updateManager').update(u.id, { active: false });
        }
        // Create new record using field names Flutter reads: 'url' and 'active'
        await pb.collection('updateManager').create({
          url: apkUrl,
          apkUrl: apkUrl,           // keep both for compatibility
          versionCode: parseFloat(versionCode),
          versionName,
          releaseNotes,
          active: true,             // Flutter reads 'active'
          isActive: true            // keep both for compatibility
        });
        await logAction('push_update', { versionName, versionCode });
        await refreshAndRender();
        showToast('Update pushed to all users!');
      } catch (err) {
        showToast('Failed to push update: ' + (err?.message || err), 'error');
      }
    }

    async function setActiveUpdate(id) {
      openConfirm('Roll back to this version?', 'This will mark this version as the active update pushed to all users.', async () => {
        try {
          for (const u of updateRecords) {
            if (u.active || u.isActive) await pb.collection('updateManager').update(u.id, { active: false, isActive: false });
          }
          await pb.collection('updateManager').update(id, { active: true, isActive: true });
          await logAction('rollback_update', { id });
          await refreshAndRender();
          showToast('Active version changed');
        } catch (err) {
          showToast('Failed to switch version: ' + (err?.message || err), 'error');
        }
      }, false);
    }

    async function deleteUpdateRecord(id) {
      openConfirm('Delete this update record?', 'This removes it from version history permanently.', async () => {
        try {
          await pb.collection('updateManager').delete(id);
          await logAction('delete_update_record', { id });
          await refreshAndRender();
          showToast('Update record deleted');
        } catch (err) {
          showToast('Failed to delete: ' + (err?.message || err), 'error');
        }
      });
    }

    // ════════════════════════════════════════════════════════════
    // Auth
    // ────────────────────────────────────────────────────────────
    // IMPORTANT FIX: the previous version signed in through the
    // "users" collection, whose create/update/delete rules require
    // a superuser. That's why channels, codes, updates etc. could
    // not be edited — every write silently failed with a 403.
    // This version authenticates against "_superusers" first (the
    // real PocketBase admin account), which has full API access
    // regardless of each collection's rules. It falls back to the
    // "users" collection so the panel still works if you deliberately
    // use an app-user account (though writes may then be limited by
    // your collection rules).
    // ════════════════════════════════════════════════════════════
    let loginMode = 'admin'; // 'admin' -> _superusers, 'user' -> users
    let loginError = '';

    async function login(email, password) {
      loginError = '';
      try {
        let authData;
        if (loginMode === 'admin') {
          // Try _superusers first (PocketBase v0.23+), fall back to admins API (v0.21)
          try {
            authData = await pb.collection('_superusers').authWithPassword(email, password);
            authCollection = '_superusers';
          } catch (e) {
            // Fallback for older PocketBase versions that use pb.admins
            if (pb.admins && pb.admins.authWithPassword) {
              authData = await pb.admins.authWithPassword(email, password);
              authCollection = '_superusers';
            } else {
              throw e;
            }
          }
        } else {
          authData = await pb.collection('users').authWithPassword(email, password);
          authCollection = 'users';
        }
        // Remember last-used email (not password) for convenience
        try { localStorage.setItem('optictv_last_email', email); } catch(e) {}
        currentUser = pb.authStore.model;
        await fetchAllData();
        checkConnection();
        renderApp();          // explicitly switch to dashboard
        showToast('Welcome back, ' + (currentUser?.name || currentUser?.email || 'Admin') + '!');
      } catch (err) {
        loginError = err?.message || 'Invalid credentials. Check your email and password.';
        renderApp();
      }
    }

    function logout() {
      pb.authStore.clear();
      currentUser = null;
      authCollection = null;
      currentTab = 'dashboard';
      renderApp();
      showToast('Logged out');
    }

        if (sortMode === 'group') return (a.group || '').localeCompare(b.group || '');
        return (a.order || 0) - (b.order || 0);
      });
      return list;

    function renderPagination(page, totalPages, fnName) {
      if (totalPages <= 1) return '';
      let pages = [];
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - page) <= 1) pages.push(i);
        else if (pages[pages.length - 1] !== '…') pages.push('…');
      }
      return `
        <div class="pagination">
          <button ${page === 1 ? 'disabled' : ''} onclick="${fnName}(${page - 1})"><i data-lucide="chevron-left" style="width:13px;height:13px;"></i></button>
          ${pages.map(p => p === '…'
            ? `<button disabled>…</button>`
            : `<button class="${p === page ? 'active' : ''}" onclick="${fnName}(${p})">${p}</button>`
          ).join('')}
          <button ${page === totalPages ? 'disabled' : ''} onclick="${fnName}(${page + 1})"><i data-lucide="chevron-right" style="width:13px;height:13px;"></i></button>
        </div>
      `;
    }

    function setSortMode(mode) { sortMode = mode; renderApp(); }

      renderApp();

    function openChannelModal(id) {

        drmScheme: '', drmLicense: '', referer: '',

      channelModalTab = 'basic';

    window.closeChannelModal = closeChannelModal;

    function field(label, id, value, opts = {}) {
      const type = opts.type || 'text';
      if (type === 'textarea') {
        return `
          <div class="field-group">
            <label class="field-label">${label}</label>
            <textarea class="input" id="${id}" rows="${opts.rows || 2}" placeholder="${opts.placeholder || ''}">${esc(value || '')}</textarea>
          </div>
        `;
      }
      if (type === 'checkbox') {
        return `
          <div class="field-group">
            <label class="checkbox-row">
              <input type="checkbox" id="${id}" ${value ? 'checked' : ''}>
              ${label}
            </label>
          </div>
        `;
      }
      if (type === 'select') {
        return `
          <div class="field-group">
            <label class="field-label">${label}</label>
            <select class="select" id="${id}">
              ${opts.options.map(o => `<option value="${esc(o.value)}" ${value === o.value ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}
            </select>
          </div>
        `;
      }
      return `
        <div class="field-group">
          <label class="field-label">${label}</label>
          <input type="${type}" class="input" id="${id}" placeholder="${opts.placeholder || ''}" value="${esc(value || '')}">
        </div>
      `;
    }

      const c = editingChannel;
      const isNew = !c.id;

      const tabs = [
        { id: 'basic', label: 'Basic' },

        { id: 'drm', label: 'DRM & Headers' },
      ];

      let body = '';
      if (channelModalTab === 'basic') {
        body = `
          ${field('Channel Name', 'f_name', c.name)}
          ${field('Stream URL', 'f_url', c.url, { placeholder: 'https://…/stream.m3u8' })}
          <div class="field-row">
            ${field('Group', 'f_group', c.group, { type: 'select', options: [
              ...(channelGroups.length ? channelGroups.map(g => ({ value: g.name, label: g.name })) : [{ value: 'General', label: 'General' }]),
              ...(c.group && !channelGroups.some(g => g.name === c.group) ? [{ value: c.group, label: c.group + ' (custom)' }] : [])
            ] })}
            ${field('Type', 'f_type', c.type || 'live', { type: 'select', options: [

          </div>

        body = `
          ${field('Logo URL', 'f_logo', c.logo, { placeholder: 'https://…/logo.png' })}
          ${field('Backdrop URL', 'f_backdrop', c.backdrop, { placeholder: 'https://…/backdrop.jpg' })}
          ${field('Subtitle URL', 'f_subtitleUrl', c.subtitleUrl, { placeholder: 'https://…/subs.vtt' })}

      } else if (channelModalTab === 'sources') {
        body = `

        body = `
          <p class="text-muted text-sm mb-3">Primary source DRM & request headers.</p>
          <div class="field-row">
            ${field('DRM Scheme', 'f_drmScheme', c.drmScheme, { placeholder: 'widevine / clearkey' })}
            ${field('User Agent', 'f_userAgent', c.userAgent)}
          </div>
          ${field('DRM License URL', 'f_drmLicense', c.drmLicense)}
          ${field('Referer', 'f_referer', c.referer)}
          <div class="divider"></div>
          <p class="text-muted text-sm mb-3">Source 2 DRM & headers.</p>
          <div class="field-row">
            ${field('Source 2 DRM Scheme', 'f_url2DrmScheme', c.url2DrmScheme)}
            ${field('Source 2 User Agent', 'f_url2UserAgent', c.url2UserAgent)}
          </div>
          ${field('Source 2 DRM License', 'f_url2DrmLicense', c.url2DrmLicense)}
          ${field('Source 2 Referer', 'f_url2Referer', c.url2Referer)}
          <div class="divider"></div>
          <p class="text-muted text-sm mb-3">Source 3 DRM & headers.</p>
          <div class="field-row">
            ${field('Source 3 DRM Scheme', 'f_url3DrmScheme', c.url3DrmScheme)}
            ${field('Source 3 User Agent', 'f_url3UserAgent', c.url3UserAgent)}
          </div>
          ${field('Source 3 DRM License', 'f_url3DrmLicense', c.url3DrmLicense)}

              <button class="modal-close" onclick="closeChannelModal()"><i data-lucide="x" style="width:15px;height:15px;"></i></button>
            </div>
            <div class="modal-body">
              <div class="modal-tabs">
                ${tabs.map(t => `<button class="modal-tab ${channelModalTab === t.id ? 'active' : ''}" onclick="setChannelModalTab('${t.id}')">${t.label}</button>`).join('')}

              <button class="btn btn-primary" id="saveChannelBtn" onclick="saveChannelModal()">

    function collectChannelFormData() {
      const val = (id) => document.getElementById(id)?.value ?? '';
      const checked = (id) => document.getElementById(id)?.checked ?? false;
      return {
        name: val('f_name').trim(),
        url: val('f_url').trim(),
        group: val('f_group'),
        type: val('f_type'),
        featured: checked('f_featured'),
        featured_order: parseFloat(val('f_featured_order')) || 0,
        logo: val('f_logo').trim(),
        backdrop: val('f_backdrop').trim(),
        subtitleUrl: val('f_subtitleUrl').trim(),
        description: val('f_description').trim(),
        url2Name: val('f_url2Name').trim(),
        url2: val('f_url2').trim(),
        url3Name: val('f_url3Name').trim(),
        url3: val('f_url3').trim(),
        drmScheme: val('f_drmScheme').trim(),
        userAgent: val('f_userAgent').trim(),
        drmLicense: val('f_drmLicense').trim(),
        referer: val('f_referer').trim(),
        url2DrmScheme: val('f_url2DrmScheme').trim(),
        url2UserAgent: val('f_url2UserAgent').trim(),
        url2DrmLicense: val('f_url2DrmLicense').trim(),

        url3DrmScheme: val('f_url3DrmScheme').trim(),

    async function saveChannelModal() {
      // Merge whichever tab's fields are currently in the DOM with
      // what we already have in editingChannel, so switching tabs
      // never loses data entered on another tab.
      const merged = Object.assign({}, editingChannel, collectChannelFormDataSafe());
      if (!merged.name) { showToast('Channel name is required', 'error'); return; }
      const btn = document.getElementById('saveChannelBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Saving…'; }
      const { id, created, updated, collectionId, collectionName, ...data } = merged;
      if (id) await updateChannel(id, data);
      else await createChannel(data);
      closeChannelModal();
    }

    function collectChannelFormDataSafe() {
      const ids = ['f_name','f_url','f_group','f_type','f_featured','f_featured_order','f_logo','f_backdrop',
        'f_subtitleUrl','f_description','f_url2Name','f_url2','f_url3Name','f_url3','f_drmScheme','f_userAgent',
        'f_drmLicense','f_referer','f_url2DrmScheme','f_url2UserAgent','f_url2DrmLicense','f_url2Referer',
        'f_url3DrmScheme','f_url3UserAgent','f_url3DrmLicense','f_url3Referer'];
      const out = {};
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return; // field not on current tab — keep previous value
        const key = id.slice(2);
        if (el.type === 'checkbox') out[key] = el.checked;
        else if (key === 'featured_order') out[key] = parseFloat(el.value) || 0;
        else out[key] = el.value.trim();
      });
      return out;
    }
    window.saveChannelModal = saveChannelModal;

    // Persist current tab's edits into editingChannel before switching tabs
    const _origSetChannelModalTab = setChannelModalTab;
    setChannelModalTab = function(tab) {
      if (editingChannel) Object.assign(editingChannel, collectChannelFormDataSafe());
      channelModalTab = tab;
      renderModals();
    };
    window.setChannelModalTab = setChannelModalTab;

    async function confirmRenameGroup() {
      const val = document.getElementById('renameGroupInput')?.value.trim();
      if (!val) { showToast('Enter a group name', 'error'); return; }
      const oldName = channelGroups.find(g => g.id === editingGroup.id)?.name;
      await renameGroup(editingGroup.id, val);
      // Cascade the rename to channels using the old group name, so
      // channels don't silently become "ungrouped".
      if (oldName && oldName !== val) {
        const affected = channels.filter(c => c.group === oldName);
        for (const c of affected) {
          try { await pb.collection('managedPlaylist').update(c.id, { group: val }); } catch (err) { /* continue */ }
        }
        if (affected.length) await fetchAllData();
      }
      closeGroupModal();
      renderApp();
    }
    window.confirmRenameGroup = confirmRenameGroup;

    function renderCodesTab() {

          </div>
          <div class="card-toolbar">
            <div class="input-group" style="flex:1;min-width:180px;">
              <i data-lucide="search"></i>
              <input type="text" class="input" id="codeSearchInput" placeholder="Search codes…" value="${esc(codeSearch)}">
            </div>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table class="data-table">
                <thead><tr><th>Status</th><th>Code</th><th>Device</th><th>Created</th><th style="width:170px;">Actions</th></tr></thead>
                <tbody>
                  ${pageItems.length === 0 ? `<tr><td colspan="5">${emptyState('ticket', 'No login codes yet')}</td></tr>` : ''}

                    <tr>
                      <td><span class="status-dot ${c.active !== false ? 'active' : 'inactive'}"></span>${c.active !== false ? 'Active' : 'Revoked'}</td>
                      <td><span class="code-font">${esc(c.code)}</span> <button class="btn btn-outline btn-xs" style="margin-left:4px;" onclick="copyToClipboard('${esc(c.code)}','Code copied')"><i data-lucide="copy" style="width:11px;height:11px;"></i></button></td>
