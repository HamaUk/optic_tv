# Force the project to use JDK 21 to avoid Java 25 compatibility issues
org.gradle.java.home=C\:\\\\Program Files\\\\Java\\\\jdk-21

# Keep heap modest so GitHub Actions (~7GB RAM runners) and phones don’t swap/OOM during Gradle.
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official

# Flutter migration flags
android.builtInKotlin=false
android.newDsl=false
